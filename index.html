<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Cantuta - Sistema Integral UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #002855; --secondary: #0047AB; --accent: #3b82f6;
            --success: #16a34a; --danger: #dc2626; --light: #f8fafc;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--light); height: 100vh; overflow: hidden; }
        
        /* LOGIN ORIGINAL */
        .login-container { display: flex; height: 100vh; }
        .login-blue { flex: 1.2; background: var(--secondary); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center;}
        .login-white { flex: 1; background: white; display: flex; justify-content: center; align-items: center; }
        .login-form { width: 320px; text-align: center; display: flex; flex-direction: column; gap: 15px; }
        .input-field { padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        .btn-main { padding: 14px; background: var(--primary); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }

        /* LAYOUT GENERAL PANELES */
        .navbar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; height: calc(100vh - 60px); overflow-y: auto; }
        .main-view { flex: 1; padding: 20px; height: calc(100vh - 60px); overflow-y: auto; }
        
        /* ELEMENTOS DE DISEÑO (BOCETOS) */
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 15px; }
        .map-placeholder { flex: 1; background: #f1f5f9; border: 3px solid var(--danger); border-radius: 10px; display: flex; align-items: center; justify-content: center; position: relative; }
        .map-label { position: absolute; top: -12px; background: white; padding: 0 10px; font-weight: bold; font-size: 13px; color: black; }
        .status-badge { padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; color: white; }
        .grid-maps { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 30px; height: 100%; padding-top: 15px; }
        .btn-ruta-blue { background: var(--secondary); color: white; border: none; padding: 12px; border-radius: 20px; width: 100%; cursor: pointer; text-align: center; font-weight: bold; margin-bottom: 8px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const db = {
            "20223691": { pass: "2022", tipo: "Estudiante", nombre: "KENYO TICSE" },
            "12345678": { pass: "1234", tipo: "Conductor", nombre: "CONDUCTOR UNE" },
            "Admin": { pass: "AdminSC", tipo: "Administrativo", nombre: "ADMIN GENERAL" }
        };

        function App() {
            const [pantalla, setPantalla] = useState("login");
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("UNI");

            const handleLogin = (e) => {
                e.preventDefault();
                const u = e.target.user.value;
                const p = e.target.pass.value;
                const t = e.target.tipo.value;

                if (db[u] && db[u].pass === p && db[u].tipo === t) {
                    setUser(db[u]);
                    setPantalla(t);
                } else {
                    alert("Datos incorrectos");
                }
            };

            const Navbar = () => (
                <div className="navbar">
                    <div style={{display:'flex', alignItems:'center', gap:'10px'}}>
                        <span>🚍</span>
                        <b>{user.tipo.toUpperCase()}: {user.nombre}</b>
                    </div>
                    <button onClick={() => window.location.reload()} style={{background:'none', border:'1px solid white', color:'white', padding:'5px 10px', borderRadius:'5px', cursor:'pointer'}}>CERRAR SESIÓN</button>
                </div>
            );

            // --- PANTALLA LOGIN (DISEÑO ORIGINAL) ---
            if (pantalla === "login") {
                return (
                    <div className="login-container">
                        <div className="login-blue">
                            <h1 style={{fontSize:'3rem', margin:0}}>Somos Cantuta</h1>
                            <p>Movilidad UNE en tiempo real</p>
                        </div>
                        <div className="login-white">
                            <form onSubmit={handleLogin} className="login-form">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Logo_UNE.png" width="80" style={{margin: "0 auto"}}/>
                                <h2>Iniciar Sesión</h2>
                                <select name="tipo" className="input-field" required>
                                    <option value="">Selecciona tu Rol</option>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Conductor">Conductor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                                <input name="user" placeholder="Usuario / Código" className="input-field" required />
                                <input name="pass" type="password" placeholder="Contraseña" className="input-field" required />
                                <button type="submit" className="btn-main">INGRESAR</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- PANEL ADMINISTRATIVO (DISEÑO BOCETO) ---
            if (pantalla === "Administrativo") return (
                <div style={{display:'flex', flexDirection:'column', height:'100vh'}}>
                    <Navbar />
                    <div style={{display:'flex', flex:1}}>
                        <aside className="sidebar">
                            <b style={{color: 'red', fontSize: '12px'}}>OPCIONES</b>
                            <button className="btn-ruta-blue" style={{marginTop:'10px'}}>VER REPORTES</button>
                            <div style={{marginTop:'20px'}}>
                                <b style={{color: 'red', fontSize: '12px'}}>AGREGAR ADMINISTRADOR</b>
                                <p style={{fontSize:'12px', color: 'blue', margin:'5px 0'}}>USUARIO:<br/>CONTRASEÑA:</p>
                            </div>
                            <div style={{marginTop:'20px'}}>
                                <b style={{color: 'blue', fontSize: '12px'}}>COADMINISTRADOR 1</b>
                                {["Ruta Bolognesi", "Ruta P. Santa Anita", "Ruta UNI", "Ruta P. Nuevo"].map((r, i) => (
                                    <div key={r} style={{display:'flex', justifyContent:'space-between', marginTop:'10px', alignItems:'center'}}>
                                        <span style={{fontSize:'10px', color:'red', fontWeight:'bold'}}>{r.toUpperCase()}</span>
                                        <span className="status-badge" style={{background: i===0 ? 'red' : '#22c55e'}}>{i===0 ? 'DENEGADO' : 'HABILITADO'}</span>
                                    </div>
                                ))}
                            </div>
                        </aside>
                        <main className="main-view flex-col">
                            <div className="grid-maps">
                                {["BOLOGNESI", "PUENTE SANTA ANITA", "UNI", "PUENTE NUEVO"].map(m => (
                                    <div key={m} className="map-placeholder">
                                        <span className="map-label">{m}</span>
                                        <b style={{color:'red'}}>MAPA</b>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                    <footer style={{height:'100px', background:'white', borderTop:'1px solid #eee', display:'flex', justifyContent:'space-around', alignItems:'center'}}>
                         {["UNI", "PUENTE NUEVO", "BOLOGNESI", "PUENTE SANTA ANITA"].map(r => (
                             <div key={r} style={{fontSize:'11px', textAlign:'center'}}>
                                 <b>RUTA {r}</b><br/>PARADERO A LLEGAR:<br/>TIEMPO DE LLEGADA:
                             </div>
                         ))}
                    </footer>
                </div>
            );

            // --- PANEL CONDUCTOR (DISEÑO BOCETO) ---
            if (pantalla === "Conductor") return (
                <div style={{display:'flex', flexDirection:'column', height:'100vh'}}>
                    <Navbar />
                    <div style={{display:'flex', flex:1}}>
                        <aside className="sidebar">
                            <b>CONDUCTOR DATOS PERSONALES</b>
                            <p style={{color:'green', fontWeight:'bold'}}>PLACA: EGB-123</p>
                            {["RUTA UNI", "RUTA BOLOGNESI", "RUTA SANTA ANITA", "RUTA PUENTE NUEVO"].map(r => (
                                <p key={r} style={{color:'red', fontWeight:'bold', fontSize:'13px', cursor:'pointer'}} onClick={() => setRutaSel(r)}>{r}</p>
                            ))}
                            <div style={{marginTop:'40px'}}>
                                <b style={{color:'green'}}>NOTIFICACIÓN</b><br/>
                                <span style={{color:'green'}}>5 ESTUDIANTES PARADERO: HUAYCAN</span><br/>
                                <b style={{color:'red'}}>BUS LLENO</b>
                            </div>
                        </aside>
                        <main className="main-view flex-col">
                            <div className="map-placeholder" style={{borderColor: 'green'}}>
                                <b style={{color:'red', fontSize:'30px'}}>COMPARTIR UBICACIÓN</b>
                            </div>
                        </main>
                    </div>
                </div>
            );

            // --- PANEL ESTUDIANTE (DISEÑO BOCETO) ---
            if (pantalla === "Estudiante") return (
                <div style={{display:'flex', flexDirection:'column', height:'100vh'}}>
                    <Navbar />
                    <div style={{display:'flex', flex:1}}>
                        <aside className="sidebar">
                            <b>DATOS PERSONALES</b><br/><br/>
                            {["RUTA UNI", "RUTA PUENTE NUEVO", "RUTA SANTA ANITA", "RUTA BOLOGNESI"].map(r => (
                                <button key={r} className="btn-ruta-blue" onClick={() => setRutaSel(r)}>{r.toLowerCase()}</button>
                            ))}
                            <p style={{color:'red', marginTop:'20px'}}>reporte</p>
                        </aside>
                        <main className="main-view" style={{display:'flex', gap:'20px'}}>
                            <div style={{flex:1}}>
                                <h3 style={{color:'red'}}>{rutaSel.toUpperCase()}<br/>BUS LLEGANDO EN 15 MIN</h3>
                                <p style={{color:'red', fontWeight:'bold'}}>WHATSAPP RUTA<br/>WHATSAPP CANAL</p>
                            </div>
                            <div className="map-placeholder" style={{flex:2}}>
                                <b style={{color:'red', fontSize:'30px'}}>MAPA</b>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
