<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Cantuteño - UNE</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --blue: #3b82f6; --dark: #1e3a8a; --red: #ef4444; --green: #22c55e; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; overflow: hidden; }
        .flex { display: flex; height: 100vh; }
        .side { width: 280px; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #e2e8f0; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; margin-bottom: 20px; }
        .btn { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: 600; width: 100%; display: flex; align-items: center; gap: 10px; transition: 0.2s; text-decoration: none; color: inherit; font-size: 13px; }
        .btn:hover { background: #f8fafc; border-color: var(--blue); }
        .btn-p { background: var(--blue); color: #fff; border: none; justify-content: center; font-size: 15px; }
        .btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        .grid-maps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .map-box { background: #eee; height: 220px; border-radius: 12px; border: 1px solid #ddd; position: relative; z-index: 1; }
        .status { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .st-red { background: #fee2e2; color: #b91c1c; }
        .st-green { background: #dcfce7; color: #166534; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .login-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .input-text { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CONFIGURACIÓN SUPABASE ---
        const SUPABASE_URL = 'https://vmltednkykuktcmfpjxw.supabase.co'; 
        const SUPABASE_KEY = 'PEGA_AQUÍ_TU_CLAVE_PUBLISHABLE'; // Reemplaza esto
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USUARIOS_DB = {
            "Admin": { pass: "Admin1", role: "Administrativo", name: "Administrador Cantuta" },
            "20223691": { pass: "20223691", role: "Estudiante", name: "KENYO PANTALEON TICSE HERRERA" },
            "12345678": { role: "Conductor", name: "LUIS PEREZ GALVEZ" }
        };

        const RUTAS_LIST = ["Ruta UNI", "Ruta Puente Nuevo", "Ruta Santa Anita", "Ruta Bolognesi"];

        function App() {
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");
            const [reportes, setReportes] = useState([]);
            const mapsRef = useRef({}); // Guardamos las instancias de los mapas aquí

            // EFECTO PRINCIPAL: Carga inicial y Tiempo Real
            useEffect(() => {
                if (!user) return;

                const cargarDatos = async () => {
                    const { data } = await supabaseClient.from('reportes').select('*').order('id', { ascending: false });
                    if (data) setReportes(data);
                };
                cargarDatos();

                // Inicializar mapas después de que el DOM cargue
                setTimeout(() => {
                    if (user.role === 'Administrativo') {
                        RUTAS_LIST.forEach(ruta => {
                            const id = `map-${ruta.replace(/\s+/g, '')}`;
                            if (document.getElementById(id) && !mapsRef.current[ruta]) {
                                const m = L.map(id).setView([-11.947, -76.700], 14);
                                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                                mapsRef.current[ruta] = { map: m, marker: L.marker([-11.947, -76.700]).addTo(m) };
                            }
                        });
                    } else if (user.role === 'Estudiante') {
                        if (document.getElementById('map-est') && !mapsRef.current['est']) {
                            const m = L.map('map-est').setView([-11.947, -76.700], 14);
                            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                            mapsRef.current['est'] = { map: m, marker: L.marker([-11.947, -76.700]).addTo(m) };
                        }
                    }
                }, 500);

                // Suscribirse a cambios en tiempo real
                const canal = supabaseClient.channel('db-changes')
                    .on('postgres_changes', { event: 'INSERT', table: 'reportes' }, p => setReportes(prev => [p.new, ...prev]))
                    .on('postgres_changes', { event: '*', table: 'ubicaciones_buses' }, p => {
                        const { ruta, latitud, longitud } = p.new;
                        // Mover marcador en Admin
                        if (user.role === 'Administrativo' && mapsRef.current[ruta]) {
                            mapsRef.current[ruta].marker.setLatLng([latitud, longitud]);
                        }
                        // Mover marcador en Estudiante si es su ruta
                        if (user.role === 'Estudiante' && ruta === rutaSel && mapsRef.current['est']) {
                            mapsRef.current['est'].marker.setLatLng([latitud, longitud]);
                        }
                    }).subscribe();

                return () => supabaseClient.removeChannel(canal);
            }, [user, rutaSel]);

            const handleLogin = (e) => {
                e.preventDefault();
                const u = USUARIOS_DB[e.target.id.value];
                if (u && (u.role === "Conductor" || u.pass === e.target.pass.value)) {
                    setUser({...u, id: e.target.id.value});
                } else alert("Datos incorrectos");
            };

            const iniciarGPS = () => {
                const r = document.getElementById('sel-ruta').value;
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(async (pos) => {
                        await supabaseClient.from('ubicaciones_buses').upsert({
                            id: user.id, ruta: r, latitud: pos.coords.latitude, longitud: pos.coords.longitude
                        });
                    }, null, { enableHighAccuracy: true });
                    alert("Transmitiendo ubicación de " + r);
                }
            };

            if (!user) return (
                <div className="flex">
                    <div className="login-screen" style={{background: 'var(--dark)', color: '#fff'}}>
                        <h1 style={{fontSize: '3rem'}}>Bus Cantuta</h1>
                    </div>
                    <div className="login-screen">
                        <form onSubmit={handleLogin} style={{width: '280px', display:'flex', flexDirection:'column', gap:'10px'}}>
                            <h2>Ingresar</h2>
                            <input name="id" placeholder="Código/DNI" className="input-text" required />
                            <input name="pass" type="password" placeholder="Contraseña" className="input-text" />
                            <button className="btn btn-p">ENTRAR</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex">
                    <div className="side">
                        <b>{user.name}</b>
                        <small className="status st-green">{user.role}</small>
                        <hr style={{width:'100%', border:'none', borderTop:'1px solid #eee'}}/>
                        {user.role === 'Estudiante' && RUTAS_LIST.map(r => (
                            <button key={r} onClick={()=>setRutaSel(r)} className={`btn ${rutaSel===r?'active':''}`}>🚍 {r}</button>
                        ))}
                        <button onClick={()=>location.reload()} className="btn" style={{marginTop:'auto', color:'var(--red)'}}>Salir</button>
                    </div>

                    <main className="main">
                        {user.role === 'Administrativo' && (
                            <>
                                <h2>Monitor de Rutas en Tiempo Real</h2>
                                <div className="grid-maps">
                                    {RUTAS_LIST.map(r => (
                                        <div key={r} className="card" style={{margin:0}}>
                                            <p><b>{r}</b></p>
                                            <div id={`map-${r.replace(/\s+/g, '')}`} className="map-box"></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="card" style={{marginTop:'20px'}}>
                                    <h3>Reportes Recientes</h3>
                                    <table>
                                        <thead><tr><th>Ruta</th><th>Motivo</th><th>Hora</th></tr></thead>
                                        <tbody>
                                            {reportes.map(rep => <tr key={rep.id}><td>{rep.ruta}</td><td>{rep.motivo}</td><td>{rep.hora}</td></tr>)}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {user.role === 'Conductor' && (
                            <div className="card">
                                <h2>Panel de Conducción</h2>
                                <p>Selecciona tu ruta actual:</p>
                                <select id="sel-ruta" className="input-text" style={{marginBottom:'10px'}}>
                                    {RUTAS_LIST.map(r => <option key={r} value={r}>{r}</option>)}
                                </select>
                                <button onClick={iniciarGPS} className="btn btn-p" style={{background:'var(--green)'}}>📡 INICIAR GPS</button>
                            </div>
                        )}

                        {user.role === 'Estudiante' && (
                            <div className="card">
                                <h1>{rutaSel}</h1>
                                <div id="map-est" className="map-box" style={{height:'350px'}}></div>
                                <p>¿Problemas con el bus?</p>
                                <button onClick={async() => {
                                    await supabaseClient.from('reportes').insert([{ruta: rutaSel, estudiante: user.name, motivo: 'Bus lleno', hora: new Date().toLocaleTimeString()}]);
                                    alert("Reportado");
                                }} className="btn" style={{color:'var(--red)'}}>🚨 Reportar Bus Lleno / No paró</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
