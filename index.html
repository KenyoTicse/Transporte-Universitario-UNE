<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Cantuteño - UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-blue: #1e3a8a;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 24px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg-light); height: 100vh; color: var(--text-main); overflow: hidden; }

        /* PANTALLA INICIAL MINIMALISTA */
        .login-container { display: flex; height: 100vh; }
        .login-blue { flex: 1.2; background: var(--dark-blue); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        .login-white { flex: 1; background: white; display: flex; justify-content: center; align-items: center; }
        .login-form { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .input-field { padding: 16px; border: 1px solid #e2e8f0; border-radius: 14px; outline: none; font-size: 15px; width: 100%; }
        .btn-main { padding: 16px; background: var(--primary-blue); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.3s; }

        /* ESTRUCTURA PANELES */
        .app-wrapper { display: flex; height: 100vh; padding: 25px; gap: 25px; box-sizing: border-box; }
        .sidebar { width: 320px; background: white; border-radius: var(--radius); padding: 30px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .main-panel { flex: 1; background: white; border-radius: var(--radius); padding: 35px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.02); position: relative; }

        /* BOTONES SIDEBAR */
        .route-btn { 
            display: flex; align-items: center; justify-content: space-between; padding: 18px; 
            border: 1px solid #f1f5f9; border-radius: 18px; background: transparent; color: var(--text-sub); 
            cursor: pointer; font-weight: 700; transition: 0.3s; width: 100%;
        }
        .route-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }
        
        /* TARJETAS WHATSAPP */
        .ws-card { 
            display: flex; align-items: center; gap: 15px; padding: 20px; 
            border-radius: 20px; border: 1px solid #f1f5f9; text-decoration: none; 
            color: inherit; transition: 0.2s; background: white; position: relative; z-index: 100;
        }
        .ws-card:hover { border-color: var(--danger); background: #fffafb; transform: translateY(-2px); }
        .ws-icon { background: #fee2e2; color: #ef4444; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

        /* GRID ADMINISTRATIVO */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .map-card { border: 1px solid #f1f5f9; border-radius: 20px; overflow: hidden; background: white; }
        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; }
        .status-green { background: #dcfce7; color: #166534; }
        .status-yellow { background: #fef3c7; color: #92400e; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const RUTAS = {
            "Ruta UNI": "https://chat.whatsapp.com/I2mw9VmXvgnL5Y7Mzuf3tj",
            "Ruta Puente Nuevo": "https://chat.whatsapp.com/IQTb0HJVjhBD0kiWqe56Ks",
            "Ruta Puente Santa Anita": "https://chat.whatsapp.com/DcOWGPkPvpD39PvA2B7iWH?mode=wwt",
            "Ruta Bolognesi": "https://chat.whatsapp.com/BEAlEiyUc3QIMdM0jUpHSY?mode=wwt"
        };
        const CANAL_OFICIAL = "https://whatsapp.com/channel/0029VbCR9BS9MF8ypba5gy0o";

        function App() {
            const [pantalla, setPantalla] = useState("login");
            const [rutaSel, setRutaSel] = useState("Ruta UNI");

            const handleLogin = (e) => {
                e.preventDefault();
                setPantalla(e.target.rol.value);
            };

            // 1. PANTALLA DE INICIO MINIMALISTA
            if (pantalla === "login") {
                return (
                    <div className="login-container">
                        <div className="login-blue">
                            <h1 style={{fontSize:'4.5rem', fontWeight:900}}>Bus cantuteño</h1>
                        </div>
                        <div className="login-white">
                            <form onSubmit={handleLogin} className="login-form">
                                <h2 style={{textAlign:'center'}}>Iniciar Sesión</h2>
                                <select name="rol" className="input-field">
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Conductor">Conductor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                                <input placeholder="Usuario" className="input-field" />
                                <input type="password" placeholder="Contraseña" className="input-field" />
                                <button type="submit" className="btn-main">INGRESAR</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // 2. PANEL ADMINISTRATIVO
            if (pantalla === "Administrativo") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <b>Administrativo</b>
                            <small>SOMOS CANTUTA</small>
                            <button className="route-btn active">Ver reportes <span>&rsaquo;</span></button>
                            <hr style={{width:'100%', border:'0.5px solid #eee'}} />
                            <div className="ws-card" style={{border:'none', background:'#f8fafc'}}>
                                <span>👤 Lucas</span> <span className="status-pill status-green">ACTIVO</span>
                            </div>
                            <button className="btn-main" style={{marginTop:'auto', background: '#ef4444'}} onClick={() => setPantalla("login")}>Salir</button>
                        </aside>
                        <main className="main-panel">
                            <h2>Panel de Control</h2>
                            <div className="admin-grid">
                                {Object.keys(RUTAS).map(r => (
                                    <div key={r} className="map-card">
                                        <div style={{padding:'15px'}}><b>{r}</b></div>
                                        <div style={{height:'150px', background:'#eee'}}></div>
                                        <div style={{padding:'15px'}}><button className="btn-main" style={{padding:'8px', width:'auto'}}>Ver Mapa</button></div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // 3. PANEL CONDUCTOR
            if (pantalla === "Conductor") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <b>Panel Conductor</b>
                            {Object.keys(RUTAS).map(r => (
                                <button key={r} onClick={() => setRutaSel(r)} className={`route-btn ${rutaSel === r ? 'active' : ''}`}>{r}</button>
                            ))}
                            <button className="btn-main" style={{marginTop:'auto', background: '#ef4444'}} onClick={() => setPantalla("login")}>Salir</button>
                        </aside>
                        <main className="main-panel">
                            <h2>Transmitiendo: {rutaSel}</h2>
                            <div style={{height:'400px', background:'#f1f5f9', borderRadius:'24px', display:'flex', alignItems:'center', justifyContent:'center'}}>📍 Mapa Activo</div>
                            <button className="btn-main" style={{width:'100%', marginTop:'20px'}}>COMPARTIR UBICACIÓN</button>
                        </main>
                    </div>
                );
            }

            // 4. PANEL ESTUDIANTE
            return (
                <div className="app-wrapper">
                    <aside className="sidebar">
                        <small style={{fontWeight:800, color:'#94a3b8'}}>MIS RUTAS</small>
                        {Object.keys(RUTAS).map(r => (
                            <button key={r} onClick={() => setRutaSel(r)} className={`route-btn ${rutaSel === r ? 'active' : ''}`}>
                                🚍 {r}
                            </button>
                        ))}
                        <button className="btn-main" style={{marginTop:'auto', background: '#ef4444'}} onClick={() => setPantalla("login")}>Salir</button>
                    </aside>
                    <main className="main-panel">
                        <div style={{display:'flex', justifyContent:'space-between'}}>
                            <h1 style={{color: 'var(--danger)', margin:0}}>{rutaSel}</h1>
                            <span className="status-pill status-green">● Bus en Ruta</span>
                        </div>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 350px', gap:'20px', marginTop:'20px'}}>
                            <div>
                                <a href={RUTAS[rutaSel]} target="_blank" className="ws-card">
                                    <div className="ws-icon">💬</div>
                                    <div><b>WhatsApp Ruta</b><br/><small>Grupo de {rutaSel}</small></div>
                                </a>
                                <a href={CANAL_OFICIAL} target="_blank" className="ws-card">
                                    <div className="ws-icon">📢</div>
                                    <div><b>WhatsApp Canal</b><br/><small>Canal Oficial</small></div>
                                </a>
                            </div>
                            <div style={{background:'#eee', borderRadius:'24px', height:'400px'}}></div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
