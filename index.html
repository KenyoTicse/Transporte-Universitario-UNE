<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Cantuteño - UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --blue: #3b82f6; --dark: #1e3a8a; --red: #ef4444; --green: #22c55e; --bg: #f8fafc; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); overflow: hidden; }
        .flex { display: flex; height: 100vh; }
        .side { width: 280px; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #eee; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #fff; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid #f1f5f9; }
        .btn { padding: 15px; border-radius: 12px; border: 1px solid #eee; background: #fff; cursor: pointer; font-weight: bold; width: 100%; display: flex; align-items: center; gap: 10px; text-decoration: none; color: inherit; }
        .btn-p { background: var(--blue); color: #fff; border: none; justify-content: center; }
        .btn.active { background: var(--blue); color: #fff; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .status { font-size: 11px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .st-red { background: #fee2e2; color: #b91c1c; }
        .st-green { background: #dcfce7; color: #166534; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const RUTAS_DATA = {
            "Ruta UNI": { placa: "EGB-402", cond: "Jorge Ramos", link: "https://chat.whatsapp.com/I2mw9VmXvgnL5Y7Mzuf3tj" },
            "Ruta Puente Nuevo": { placa: "A9N-012", cond: "Raul Perez", link: "https://chat.whatsapp.com/IQTb0HJVjhBD0kiWqe56Ks" },
            "Ruta Santa Anita": { placa: "B5F-992", cond: "M. Quispe", link: "https://chat.whatsapp.com/DcOWGPkPvpD39PvA2B7iWH" },
            "Ruta Bolognesi": { placa: "C1T-551", cond: "L. Huaman", link: "https://chat.whatsapp.com/BEAlEiyUc3QIMdM0jUpHSY" }
        };
        const CANAL_LINK = "https://whatsapp.com/channel/0029VbCR9BS9MF8ypba5gy0o";

        const App = () => {
            const [p, setP] = useState("login");
            const [r, setR] = useState("Ruta UNI");
            const [reps, setReps] = useState([]);

            const sendRep = () => {
                const n = { id: Date.now(), h: new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}), r, p: RUTAS_DATA[r].placa, c: RUTAS_DATA[r].cond };
                setReps([n, ...reps]);
                alert("Reporte enviado al administrador");
            };

            const copyInfo = (ruta) => {
                const txt = `RUTA: ${ruta}\nPARADERO ACTUAL: Cargando...\nTIEMPO ESTIMADO: 15 min`;
                navigator.clipboard.writeText(txt);
                alert("Texto copiado");
            };

            if (p === "login") return (
                <div className="flex">
                    <div style={{flex:1.2, background:'var(--dark)', color:'#fff', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center'}}>
                        <h1 style={{fontSize:'4.5rem', margin:0}}>Bus cantuteño</h1>
                    </div>
                    <div style={{flex:1, display:'flex', justifyContent:'center', alignItems:'center', background:'#fff'}}>
                        <form onSubmit={(e) => { e.preventDefault(); setP(e.target.rol.value); }} style={{width:'300px', display:'flex', flexDirection:'column', gap:'15px'}}>
                            <h2 style={{textAlign:'center'}}>Bienvenido</h2>
                            <select name="rol" className="btn">
                                <option value="Estudiante">Estudiante</option>
                                <option value="Administrativo">Administrativo</option>
                            </select>
                            <input placeholder="Usuario o Código" className="btn" style={{textAlign:'left'}} />
                            <button className="btn btn-p">INGRESAR</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex">
                    <div className="side">
                        <b>{p} UNE</b>
                        <small className="status st-green">Conectado</small>
                        <hr style={{width:'100%', border:'0.5px solid #eee'}}/>
                        {p === "Estudiante" && Object.keys(RUTAS_DATA).map(n => (
                            <button key={n} onClick={()=>setR(n)} className={`btn ${r===n?'active':''}`}>🚍 {n}</button>
                        ))}
                        {p === "Administrativo" && <button className="btn active">📊 Panel Control</button>}
                        <button onClick={()=>setP("login")} className="btn" style={{marginTop:'auto', color:'var(--red)'}}>🚪 Salir</button>
                    </div>

                    <main className="main">
                        {p === "Estudiante" && (
                            <div className="card">
                                <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                                    <h1 style={{color:'var(--red)', margin:0}}>{r}</h1>
                                    <span className="status st-green">● En camino</span>
                                </div>
                                <div className="grid" style={{marginTop:'20px'}}>
                                    <div>
                                        <a href={RUTAS_DATA[r].link} target="_blank" className="btn" style={{marginBottom:'10px'}}>💬 WhatsApp Ruta</a>
                                        <a href={CANAL_LINK} target="_blank" className="btn" style={{marginBottom:'10px', borderColor:'var(--blue)'}}>📢 Canal Transporte Universitario</a>
                                        <button onClick={sendRep} className="btn" style={{color:'var(--red)', borderColor:'var(--red)'}}>🚨 El bus no paró (Vacío)</button>
                                    </div>
                                    <div style={{background:'#eee', borderRadius:'15px', height:'300px', display:'flex', alignItems:'center', justifyContent:'center'}}>📍 Mapa en tiempo real</div>
                                </div>
                            </div>
                        )}

                        {p === "Administrativo" && (
                            <>
                                <h2>Monitor de Rutas</h2>
                                <div className="grid" style={{gridTemplateColumns:'repeat(2, 1fr)', gap:'15px'}}>
                                    {Object.keys(RUTAS_DATA).map(name => (
                                        <div key={name} className="card" style={{margin:0, padding:'15px'}}>
                                            <div style={{display:'flex', justifyContent:'space-between'}}>
                                                <b>{name}</b>
                                                <button onClick={()=>copyInfo(name)} style={{fontSize:'10px', cursor:'pointer'}}>📋 Copiar</button>
                                            </div>
                                            <div style={{height:'100px', background:'#eee', margin:'10px 0', borderRadius:'10px'}}></div>
                                            <small>Placa: {RUTAS_DATA[name].placa}</small>
                                        </div>
                                    ))}
                                </div>
                                <div className="card" style={{marginTop:'20px'}}>
                                    <h3>Reportes del Día</h3>
                                    <table>
                                        <thead><tr><th>Hora</th><th>Ruta</th><th>Placa</th><th>Motivo</th></tr></thead>
                                        <tbody>
                                            {reps.length===0 ? <tr><td colSpan="4">Sin reportes</td></tr> : 
                                            reps.map(x => <tr key={x.id}><td>{x.h}</td><td>{x.r}</td><td>{x.p}</td><td><span className="status st-red">No paró</span></td></tr>)}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}
                    </main>
                </div>
            );
        };
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
