<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Cantuta - Sistema Integral UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-blue: #1e3a8a;
            --bg-light: #f8fafc;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 24px;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg-light); height: 100vh; color: var(--text-main); overflow: hidden; }

        /* LOGIN */
        .login-container { display: flex; height: 100vh; }
        .login-blue { flex: 1.2; background: var(--dark-blue); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px; }
        .login-white { flex: 1; background: white; display: flex; justify-content: center; align-items: center; }
        .login-form { width: 350px; display: flex; flex-direction: column; gap: 15px; }
        .input-field { padding: 16px; border: 1px solid #e2e8f0; border-radius: 14px; outline: none; font-size: 15px; width: 100%; }
        .btn-main { padding: 16px; background: var(--primary-blue); color: white; border: none; border-radius: 14px; cursor: pointer; font-weight: 700; transition: 0.3s; }
        .btn-main:hover { background: var(--dark-blue); }

        /* LAYOUT GENERAL */
        .app-wrapper { display: flex; height: 100vh; padding: 25px; gap: 25px; box-sizing: border-box; }
        .sidebar { width: 320px; background: white; border-radius: var(--radius); padding: 30px; display: flex; flex-direction: column; gap: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.02); }
        .main-panel { flex: 1; background: white; border-radius: var(--radius); padding: 40px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.02); position: relative; }

        /* BOTONES SIDEBAR */
        .route-btn { 
            display: flex; align-items: center; justify-content: space-between; padding: 18px; 
            border: 1px solid #f1f5f9; border-radius: 18px; background: transparent; color: var(--text-sub); 
            cursor: pointer; font-weight: 700; transition: 0.3s; width: 100%;
        }
        .route-btn.active { background: var(--primary-blue); color: white; border-color: var(--primary-blue); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.2); }
        
        /* TARJETAS WHATSAPP */
        .ws-card { 
            display: flex; align-items: center; gap: 15px; padding: 22px; 
            border-radius: 22px; border: 1px solid #f1f5f9; text-decoration: none; 
            color: inherit; transition: 0.2s; background: white; position: relative; z-index: 10;
        }
        .ws-card:hover { border-color: var(--danger); background: #fffafb; transform: translateY(-2px); }
        .ws-icon { background: #fee2e2; color: #ef4444; width: 48px; height: 48px; border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* PANEL ADMINISTRATIVO GRID */
        .admin-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .map-card { border: 1px solid #f1f5f9; border-radius: 20px; overflow: hidden; background: white; }
        .map-img { height: 180px; width: 100%; object-fit: cover; background: #e2e8f0; }
        
        /* ESTADOS */
        .status-pill { padding: 6px 12px; border-radius: 10px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .status-green { background: #dcfce7; color: #166534; }
        .status-yellow { background: #fef3c7; color: #92400e; }

        .btn-action { padding: 10px 24px; border-radius: 12px; border: none; background: var(--primary-blue); color: white; font-weight: 700; cursor: pointer; }
        .btn-danger { background: var(--danger); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const WS_LINKS = {
            canal: "https://whatsapp.com/channel/0029VbCR9BS9MF8ypba5gy0o",
            rutas: {
                "Ruta UNI": "https://chat.whatsapp.com/I2mw9VmXvgnL5Y7Mzuf3tj",
                "Ruta Puente Nuevo": "https://chat.whatsapp.com/IQTb0HJVjhBD0kiWqe56Ks",
                "Ruta Puente Santa Anita": "https://chat.whatsapp.com/DcOWGPkPvpD39PvA2B7iWH?mode=wwt",
                "Ruta Bolognesi": "https://chat.whatsapp.com/BEAlEiyUc3QIMdM0jUpHSY?mode=wwt"
            }
        };

        function App() {
            const [view, setView] = useState("login");
            const [ruta, setRuta] = useState("Ruta UNI");

            const handleLogin = (e) => {
                e.preventDefault();
                setView(e.target.rol.value);
            };

            if (view === "login") {
                return (
                    <div className="login-container">
                        <div className="login-blue">
                            <h1 style={{fontSize:'4rem', margin:0, fontWeight:900}}>Somos Cantuta</h1>
                            <p style={{fontSize:'1.2rem', opacity:0.8}}>Movilidad UNE en tiempo real</p>
                        </div>
                        <div className="login-white">
                            <form onSubmit={handleLogin} className="login-form">
                                <h2 style={{textAlign:'center', marginBottom:'20px'}}>Bienvenido</h2>
                                <select name="rol" className="input-field" required>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Conductor">Conductor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                                <input placeholder="Usuario / Código" className="input-field" />
                                <input type="password" placeholder="Contraseña" className="input-field" />
                                <button type="submit" className="btn-main">INGRESAR AL PANEL</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- PANEL ADMINISTRATIVO (image_a6e51f.jpg) ---
            if (view === "Administrativo") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px'}}>
                                <div style={{background: 'var(--primary-blue)', padding: '12px', borderRadius: '15px', color:'white'}}>🚍</div>
                                <div><b style={{fontSize:'18px'}}>Administrativo</b><br/><small style={{color:'var(--text-sub)'}}>SOMOS CANTUTA</small></div>
                            </div>
                            <small style={{fontWeight:800, color:'var(--text-sub)'}}>OPCIONES</small>
                            <button className="route-btn active">Ver reportes <span>&rsaquo;</span></button>
                            
                            <small style={{fontWeight:800, color:'var(--text-sub)', marginTop:'15px'}}>COADMINISTRADOR</small>
                            <div className="ws-card" style={{padding:'12px', justifyContent:'space-between', border:'none', background:'#f8fafc'}}>
                                <span>👤 Lucas</span> <span className="status-pill status-green">INICIADO SESION</span>
                            </div>
                            <div className="ws-card" style={{padding:'12px', justifyContent:'space-between', border:'none', background:'#f8fafc'}}>
                                <span>👤 Pedro</span> <span className="status-pill status-yellow">EN ESPERA</span>
                            </div>
                        </aside>
                        <main className="main-panel">
                            <div style={{display:'flex', justifyContent:'right', marginBottom:'20px'}}>
                                <button className="btn-action btn-danger" onClick={() => setView("login")}>Cerrar sesión</button>
                            </div>
                            <div className="admin-grid">
                                {["Bolognesi", "UNI", "Ruta", "Puente Nuevo"].map(n => (
                                    <div key={n} className="map-card">
                                        <div style={{padding:'15px'}}><b>{n}</b></div>
                                        <img className="map-img" src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=14&size=400x200&key=API" />
                                        <div style={{padding:'20px'}}>
                                            <div style={{fontSize:'12px', color:'var(--text-sub)'}}>Paradero a llegar:</div>
                                            <div style={{fontWeight:700, marginBottom:'10px'}}>Tiempo de llegada</div>
                                            <button className="btn-action" style={{fontSize:'12px'}}>Copiar</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- PANEL CONDUCTOR (image_a616af.jpg) ---
            if (view === "Conductor") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <div style={{display:'flex', alignItems:'center', gap:'12px', marginBottom:'20px'}}>
                                <div style={{background: 'var(--primary-blue)', padding: '12px', borderRadius: '15px', color:'white'}}>🚍</div>
                                <div><b style={{fontSize:'18px'}}>Conductor</b><br/><small style={{color:'var(--text-sub)'}}>DATOS PERSONALES</small></div>
                            </div>
                            <div style={{padding:'15px', background:'#f8fafc', borderRadius:'15px', marginBottom:'10px'}}>Placa: ABC-123</div>
                            {Object.keys(WS_LINKS.rutas).map(r => (
                                <button key={r} onClick={() => setRuta(r)} className={`route-btn ${ruta === r ? 'active' : ''}`}>{r} <span>&rsaquo;</span></button>
                            ))}
                            <button className="btn-action btn-danger" style={{marginTop:'auto'}} onClick={() => setView("login")}>Cerrar sesión</button>
                        </aside>
                        <main className="main-panel">
                            <h2>Huaycán</h2>
                            <div style={{borderRadius:'24px', overflow:'hidden', border:'1px solid #f1f5f9', marginBottom:'20px'}}>
                                <img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=15&size=800x400&key=API" style={{width:'100%', height:'350px', objectFit:'cover'}} />
                            </div>
                            <div style={{display:'flex', flexDirection:'column', gap:'12px'}}>
                                <div className="ws-card" style={{borderLeft:'6px solid var(--success)'}}>🔔 <b>Notificación:</b> <span style={{color:'var(--success)'}}>5 esterihuatca</span></div>
                                <div className="ws-card" style={{borderLeft:'6px solid var(--danger)'}}>⏰ <b>Bus lleno</b></div>
                                <button className="btn-main" style={{width:'100%', fontSize:'18px'}}>📢 Compartir ubicación</button>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- PANEL ESTUDIANTE (image_a59743.jpg) ---
            return (
                <div className="app-wrapper">
                    <aside className="sidebar">
                        <small style={{fontWeight:800, color:'var(--text-sub)', marginBottom:'10px'}}>DATOS PERSONALES</small>
                        {Object.keys(WS_LINKS.rutas).map(r => (
                            <button key={r} onClick={() => setRuta(r)} className={`route-btn ${ruta === r ? 'active' : ''}`}>🚍 {r} <span>&rsaquo;</span></button>
                        ))}
                        <div style={{marginTop:'auto', display:'flex', flexDirection:'column', gap:'10px'}}>
                            <div className="route-btn" style={{color: 'var(--danger)'}}>🚨 Reporte <span>&rsaquo;</span></div>
                            <div className="route-btn" onClick={() => setView("login")}>🚪 Cerrar sesión <span>&rsaquo;</span></div>
                        </div>
                    </aside>
                    <main className="main-panel">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <h1 style={{color: 'var(--danger)', margin:0, fontSize:'32px'}}>{ruta.toUpperCase()}</h1>
                            <span className="status-pill status-green">● En camino</span>
                        </div>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 400px', gap:'40px', marginTop:'30px'}}>
                            <div style={{display:'flex', flexDirection:'column', gap:'15px'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'10px', fontWeight:700, marginBottom:'10px'}}>🚍 Bus llegando en 15 min</div>
                                <a href={WS_LINKS.rutas[ruta]} target="_blank" rel="noopener noreferrer" className="ws-card">
                                    <div className="ws-icon">💬</div>
                                    <div style={{flex:1}}><b>WhatsApp Ruta</b><br/><small style={{color:'var(--text-sub)'}}>Grupo de la {ruta}</small></div>
                                    <span>🔗</span>
                                </a>
                                <a href={WS_LINKS.canal} target="_blank" rel="noopener noreferrer" className="ws-card">
                                    <div className="ws-icon">📢</div>
                                    <div style={{flex:1}}><b>WhatsApp Canal</b><br/><small style={{color:'var(--text-sub)'}}>Canal oficial de anuncios</small></div>
                                    <span>🔗</span>
                                </a>
                                <div className="ws-card" style={{background:'#eff6ff', border:'none'}}>
                                    <div className="ws-icon" style={{background:'#3b82f6', color:'white'}}>i</div>
                                    <div><b>Información de servicio</b><br/><small>Actualizado hace 2 minutos</small></div>
                                </div>
                            </div>
                            <div style={{border:'1px solid #f1f5f9', borderRadius:'24px', overflow:'hidden', height:'500px'}}>
                                <div style={{padding:'15px', borderBottom:'1px solid #f1f5f9', fontSize:'11px', fontWeight:800}}>MAPA EN TIEMPO REAL</div>
                                <img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=14&size=400x500&key=API" style={{width:'100%', height:'100%', objectFit:'cover'}} />
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
