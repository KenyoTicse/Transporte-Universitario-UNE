<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantured UNE - Movilidad</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --blue: #0056b3; --light-blue: #e7f0fd; --red: #d93025; --green: #1e8e3e; --bg: #f1f3f4; --dark: #0a192f; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); color: #3c4043; }
        
        /* DISEÑO DE LOGIN (Referencia: imagen_4102db.png) */
        .login-bg { 
            height: 100vh; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            display: flex; justify-content: center; align-items: center;
            position: relative; overflow: hidden;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            padding: 40px; border-radius: 20px; 
            width: 350px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center; color: white; z-index: 10;
        }
        .login-card h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 2px; }
        .input-login { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: none; background: rgba(255,255,255,0.2); color: white; outline: none; box-sizing: border-box;
        }
        .input-login::placeholder { color: #cbd5e1; }
        .btn-login { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #3b82f6; color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn-login:hover { background: #2563eb; transform: translateY(-2px); }

        /* HEADER Y DASHBOARD */
        .header { background: var(--blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .flex { display: flex; height: calc(100vh - 60px); }
        .side { width: 240px; background: #fff; padding: 15px; border-right: 1px solid #dadce0; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .btn { padding: 10px 15px; border-radius: 6px; border: 1px solid #dadce0; background: #fff; cursor: pointer; width: 100%; text-align: left; margin-bottom: 5px; }
        .btn.active { background: #e8f0fe; color: #1967d2; border-color: #1967d2; font-weight: bold; }
        .card { background: #fff; border-radius: 8px; border: 1px solid #dadce0; padding: 20px; margin-bottom: 20px; }
        .map-box { height: 400px; border-radius: 8px; border: 1px solid #dadce0; background: #eee; }
        
        .status-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; }
        .bg-proximo { background: #1e8e3e; }
        .bg-llegando { background: #d93025; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://vmltednkykuktcmfpjxw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtbHRlZG5reWt1a3RjbWZwanh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODUwNTEsImV4cCI6MjA5MDA2MTA1MX0.kKS03A0zburhy3_7SkY-cYs8yyzXjwPihX-2Xqy8jqg'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USUARIOS_DB = {
            "Admin": { pass: "Admin1", role: "Administrativo", name: "Administrador Cantuta" },
            "20223691": { pass: "20223691", role: "Estudiante", name: "KENYO PANTALEON TICSE HERRERA" },
            "12345678": { role: "Conductor", name: "LUIS PEREZ GALVEZ" }
        };

        const RUTAS_LIST = ["Ruta UNI", "Ruta Bolognesi", "Ruta Puente Nuevo", "Ruta Santa Anita"];

        function App() {
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");
            const mapsRef = useRef({});

            const handleLogin = (e) => {
                e.preventDefault();
                const id = e.target.id.value;
                const pass = e.target.pass.value;
                const u = USUARIOS_DB[id];
                if (u && (u.role === "Conductor" || u.pass === pass)) {
                    setUser({...u, id: id});
                } else alert("Credenciales incorrectas");
            };

            const iniciarGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.watchPosition(async (pos) => {
                        const { latitude, longitude } = pos.coords;
                        
                        // Actualizar mapa local del conductor
                        if (mapsRef.current['map-cond']) {
                            mapsRef.current['map-cond'].marker.setLatLng([latitude, longitude]);
                            mapsRef.current['map-cond'].map.setView([latitude, longitude]);
                        }

                        // Upsert en Supabase
                        await supabaseClient.from('ubicaciones_buses').upsert({
                            id: user.id,
                            ruta: rutaSel,
                            latitud: latitude,
                            longitud: longitude,
                            ultima_actualizacion: new Date().toISOString()
                        });
                    }, (err) => alert("Error GPS: " + err.message), { enableHighAccuracy: true });
                    alert("📡 GPS Activado para " + rutaSel);
                }
            };

            useEffect(() => {
                if (!user) return;
                setTimeout(() => {
                    const mapId = user.role === 'Administrativo' ? 'map-admin' : (user.role === 'Estudiante' ? 'map-est' : 'map-cond');
                    if (document.getElementById(mapId) && !mapsRef.current[mapId]) {
                        const m = L.map(mapId).setView([-11.947, -76.700], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                        mapsRef.current[mapId] = { map: m, marker: L.marker([-11.947, -76.700]).addTo(m) };
                    }
                }, 500);
            }, [user]);

            if (!user) return (
                <div className="login-bg">
                    <form className="login-card" onSubmit={handleLogin}>
                        <h2>LOGIN</h2>
                        <input name="id" placeholder="Username" className="input-login" required />
                        <input name="pass" type="password" placeholder="Password" className="input-login" />
                        <div style={{textAlign:'left', fontSize:'12px', marginBottom:'20px'}}>
                            <input type="checkbox" id="rem" /> <label htmlFor="rem">Remember me</label>
                        </div>
                        <button className="btn-login">LOGIN</button>
                        <p style={{fontSize:'12px', marginTop:'15px', cursor:'pointer'}}>Forgot your password?</p>
                    </form>
                </div>
            );

            return (
                <div>
                    <header className="header">
                        <div style={{fontWeight:'bold'}}>Movilidad UNE</div>
                        <div style={{fontSize:'12px'}}>{user.name} ({user.role})</div>
                    </header>
                    <div className="flex">
                        <nav className="side">
                            {RUTAS_LIST.map(r => (
                                <button key={r} onClick={() => setRutaSel(r)} className={`btn ${rutaSel === r ? 'active' : ''}`}>🚍 {r}</button>
                            ))}
                            <button onClick={()=>location.reload()} className="btn" style={{marginTop:'auto', color:'var(--red)'}}>Salir</button>
                        </nav>
                        <main className="main">
                            {user.role === 'Conductor' ? (
                                <div className="card" style={{textAlign:'center'}}>
                                    <h2>Panel de Conducción</h2>
                                    <p>Ruta: <b>{rutaSel}</b></p>
                                    <button onClick={iniciarGPS} className="btn-login" style={{background:'var(--green)', width:'200px', margin:'0 auto 20px'}}>
                                        📡 INICIAR GPS
                                    </button>
                                    <div id="map-cond" className="map-box"></div>
                                </div>
                            ) : (
                                <div className="card">
                                    <h2>Seguimiento: {rutaSel}</h2>
                                    <div id={user.role === 'Administrativo' ? 'map-admin' : 'map-est'} className="map-box"></div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
