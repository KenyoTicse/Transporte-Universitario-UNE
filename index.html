<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantured UNE - Movilidad</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --blue: #0056b3; --red: #d93025; --green: #1e8e3e; --bg: #f1f3f4; }
        body { margin: 0; font-family: 'Roboto', sans-serif; background: var(--bg); color: #3c4043; }
        
        /* DISEÑO DE LOGIN (Estilo imagen_4102db.png) */
        .login-bg { 
            height: 100vh; 
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 50%, #3b82f6 100%);
            display: flex; justify-content: center; align-items: center;
        }
        .login-card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(15px); 
            padding: 40px; border-radius: 20px; 
            width: 350px; border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center; color: white;
        }
        .input-login { 
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; 
            border: none; background: rgba(255,255,255,0.2); color: white; box-sizing: border-box;
        }
        .btn-login { 
            width: 100%; padding: 12px; border-radius: 8px; border: none; 
            background: #3b82f6; color: white; font-weight: bold; cursor: pointer;
        }

        /* DASHBOARD */
        .header { background: var(--blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .flex { display: flex; height: calc(100vh - 60px); }
        .side { width: 240px; background: #fff; padding: 15px; border-right: 1px solid #dadce0; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }
        .btn-ruta { padding: 10px; border-radius: 6px; border: 1px solid #ddd; background: #fff; cursor: pointer; width: 100%; margin-bottom: 5px; text-align: left; }
        .btn-ruta.active { background: #e8f0fe; color: #1967d2; border-color: #1967d2; font-weight: bold; }
        .card { background: #fff; border-radius: 8px; border: 1px solid #dadce0; padding: 20px; text-align: center; }
        .map-box { height: 400px; border-radius: 8px; border: 1px solid #dadce0; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://vmltednkykuktcmfpjxw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtbHRlZG5reWt1a3RjbWZwanh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODUwNTEsImV4cCI6MjA5MDA2MTA1MX0.kKS03A0zburhy3_7SkY-cYs8yyzXjwPihX-2Xqy8jqg'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USUARIOS_DB = {
            "Admin": { pass: "Admin1", role: "Administrativo", name: "Administrador Cantuta" },
            "20223691": { pass: "20223691", role: "Estudiante", name: "KENYO PANTALEON TICSE HERRERA" },
            "12345678": { role: "Conductor", name: "LUIS PEREZ GALVEZ" }
        };

        function App() {
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");
            const [isTracking, setIsTracking] = useState(false);
            const watchId = useRef(null);
            const mapsRef = useRef({});

            const handleLogin = (e) => {
                e.preventDefault();
                const u = USUARIOS_DB[e.target.id.value];
                if (u && (u.role === "Conductor" || u.pass === e.target.pass.value)) {
                    setUser({...u, id: e.target.id.value});
                } else alert("Credenciales incorrectas");
            };

            const toggleGPS = () => {
                if (!isTracking) {
                    if (navigator.geolocation) {
                        watchId.current = navigator.geolocation.watchPosition(async (pos) => {
                            const { latitude, longitude } = pos.coords;
                            if (mapsRef.current['map-cond']) {
                                mapsRef.current['map-cond'].marker.setLatLng([latitude, longitude]);
                                mapsRef.current['map-cond'].map.setView([latitude, longitude]);
                            }
                            await supabaseClient.from('ubicaciones_buses').upsert({
                                id: user.id, ruta: rutaSel, latitud: latitude, longitud: longitude, ultima_actualizacion: new Date().toISOString()
                            });
                        }, (err) => alert("Error: " + err.message), { enableHighAccuracy: true });
                        setIsTracking(true);
                    }
                } else {
                    navigator.geolocation.clearWatch(watchId.current);
                    setIsTracking(false);
                    alert("📡 GPS Apagado");
                }
            };

            useEffect(() => {
                if (!user) return;
                setTimeout(() => {
                    const mapId = user.role === 'Conductor' ? 'map-cond' : 'map-view';
                    if (document.getElementById(mapId) && !mapsRef.current[mapId]) {
                        const m = L.map(mapId).setView([-11.947, -76.700], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                        mapsRef.current[mapId] = { map: m, marker: L.marker([-11.947, -76.700]).addTo(m) };
                    }
                }, 500);
            }, [user]);

            if (!user) return (
                <div className="login-bg">
                    <form className="login-card" onSubmit={handleLogin}>
                        <h2>LOGIN</h2>
                        <input name="id" placeholder="Username" className="input-login" required />
                        <input name="pass" type="password" placeholder="Password" className="input-login" />
                        <button className="btn-login">LOGIN</button>
                    </form>
                </div>
            );

            return (
                <div>
                    <header className="header">
                        <div><b>Movilidad UNE</b></div>
                        <div style={{fontSize:'12px'}}>{user.name}</div>
                    </header>
                    <div className="flex">
                        <nav className="side">
                            {["Ruta UNI", "Ruta Bolognesi", "Ruta Puente Nuevo"].map(r => (
                                <button key={r} onClick={() => setRutaSel(r)} className={`btn-ruta ${rutaSel === r ? 'active' : ''}`}>🚍 {r}</button>
                            ))}
                            <button onClick={()=>location.reload()} className="btn-ruta" style={{marginTop:'auto', color:'var(--red)'}}>Salir</button>
                        </nav>
                        <main className="main">
                            <div className="card">
                                <h2>{user.role === 'Conductor' ? 'Panel de Control' : `Ubicación: ${rutaSel}`}</h2>
                                {user.role === 'Conductor' && (
                                    <button 
                                        onClick={toggleGPS} 
                                        className="btn-login" 
                                        style={{background: isTracking ? 'var(--red)' : 'var(--green)', width:'250px'}}
                                    >
                                        {isTracking ? '🛑 APAGAR GPS' : '📡 INICIAR GPS'}
                                    </button>
                                )}
                                <div id={user.role === 'Conductor' ? 'map-cond' : 'map-view'} className="map-box"></div>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
