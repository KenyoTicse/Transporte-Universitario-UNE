<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantured UNE - Movilidad</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --blue: #0056b3; --light-blue: #e7f0fd; --red: #d93025; --green: #1e8e3e; --bg: #f1f3f4; --dark: #1e3a8a; }
        body { margin: 0; font-family: 'Roboto', 'Segoe UI', sans-serif; background: var(--bg); color: #3c4043; overflow: hidden; }
        
        /* Login */
        .login-screen { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .input-text { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; margin-bottom: 10px; }

        /* Header */
        .header { background: var(--blue); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; box-sizing: border-box; }
        .header-title { display: flex; align-items: center; gap: 15px; font-weight: bold; font-size: 20px; }

        .flex { display: flex; height: calc(100vh - 60px); }
        .side { width: 240px; background: #fff; padding: 15px; border-right: 1px solid #dadce0; display: flex; flex-direction: column; }
        .main { flex: 1; padding: 20px; overflow-y: auto; }

        .btn { padding: 10px 15px; border-radius: 6px; border: 1px solid #dadce0; background: #fff; cursor: pointer; width: 100%; text-align: left; margin-bottom: 5px; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .btn.active { background: #e8f0fe; color: #1967d2; border-color: #1967d2; font-weight: bold; }
        .btn-p { background: var(--blue); color: #fff; border: none; justify-content: center; font-size: 15px; }

        .info-grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; margin-bottom: 20px; }
        .card { background: #fff; border-radius: 8px; border: 1px solid #dadce0; padding: 20px; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .map-box { height: 400px; border-radius: 8px; border: 1px solid #dadce0; background: #eee; z-index: 1; }

        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 8px; overflow: hidden; border: 1px solid #dadce0; }
        th { background: #f8f9fa; padding: 12px; text-align: left; border-bottom: 2px solid #dadce0; font-size: 13px; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 13px; }
        
        .status-badge { padding: 4px 10px; border-radius: 4px; font-weight: bold; font-size: 11px; color: white; }
        .bg-proximo { background: #1e8e3e; }
        .bg-llegando { background: #d93025; }
        .bg-espera { background: #70757a; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://vmltednkykuktcmfpjxw.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZtbHRlZG5reWt1a3RjbWZwanh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0ODUwNTEsImV4cCI6MjA5MDA2MTA1MX0.kKS03A0zburhy3_7SkY-cYs8yyzXjwPihX-2Xqy8jqg'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USUARIOS_DB = {
            "Admin": { pass: "Admin1", role: "Administrativo", name: "Administrador Cantuta" },
            "20223691": { pass: "20223691", role: "Estudiante", name: "KENYO PANTALEON TICSE HERRERA" },
            "12345678": { role: "Conductor", name: "LUIS PEREZ GALVEZ" }
        };

        const RUTAS_LIST = ["Ruta UNI", "Ruta Bolognesi", "Ruta Puente Nuevo", "Ruta Santa Anita"];

        function App() {
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");
            const mapsRef = useRef({});

            const handleLogin = (e) => {
                e.preventDefault();
                const u = USUARIOS_DB[e.target.id.value];
                if (u && (u.role === "Conductor" || u.pass === e.target.pass.value)) {
                    setUser({...u, id: e.target.id.value});
                } else alert("Datos incorrectos");
            };

            useEffect(() => {
                if (!user) return;

                // Inicializar Mapas después del Login
                setTimeout(() => {
                    const mapId = user.role === 'Administrativo' ? 'map-admin' : (user.role === 'Estudiante' ? 'map-est' : 'map-cond');
                    if (document.getElementById(mapId) && !mapsRef.current[mapId]) {
                        const m = L.map(mapId).setView([-11.947, -76.700], 13);
                        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(m);
                        mapsRef.current[mapId] = { map: m, marker: L.marker([-11.947, -76.700]).addTo(m) };
                    }
                }, 500);

                // Escuchar cambios de ubicación
                const channel = supabaseClient.channel('realtime-updates')
                    .on('postgres_changes', { event: '*', table: 'ubicaciones_buses' }, p => {
                        const { ruta, latitud, longitud } = p.new;
                        const activeMap = user.role === 'Administrativo' ? 'map-admin' : 'map-est';
                        
                        if (ruta === rutaSel && mapsRef.current[activeMap]) {
                            mapsRef.current[activeMap].marker.setLatLng([latitud, longitud]);
                            mapsRef.current[activeMap].map.panTo([latitud, longitud]);
                        }
                    }).subscribe();

                return () => supabaseClient.removeChannel(channel);
            }, [user, rutaSel]);

            if (!user) return (
                <div style={{display:'flex', height:'100vh'}}>
                    <div className="login-screen" style={{flex:1, background: 'var(--dark)', color: '#fff'}}>
                        <h1 style={{fontSize: '3rem', margin:0}}>Movilidad UNE</h1>
                        <p>Gestión de Transporte Universitario</p>
                    </div>
                    <div className="login-screen" style={{flex:1, background:'#fff'}}>
                        <form onSubmit={handleLogin} style={{width: '300px'}}>
                            <h2 style={{color: 'var(--dark)'}}>Iniciar Sesión</h2>
                            <input name="id" placeholder="Código o DNI" className="input-text" required />
                            <input name="pass" type="password" placeholder="Contraseña" className="input-text" />
                            <button className="btn btn-p" style={{marginTop:'10px'}}>INGRESAR</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div>
                    <header className="header">
                        <div className="header-title">
                            <span>Movilidad UNE</span>
                        </div>
                        <div style={{fontSize: '11px', textAlign: 'right'}}>
                            <b>{user.name}</b><br/>{user.role}
                        </div>
                    </header>

                    <div className="flex">
                        <nav className="side">
                            <p style={{fontSize:'12px', color:'#666', marginLeft:'15px'}}>RUTAS DISPONIBLES</p>
                            {RUTAS_LIST.map(r => (
                                <button key={r} onClick={() => setRutaSel(r)} className={`btn ${rutaSel === r ? 'active' : ''}`}>
                                    🚍 {r}
                                </button>
                            ))}
                            <button onClick={()=>location.reload()} className="btn" style={{marginTop:'auto', color:'var(--red)'}}>🚪 Cerrar Sesión</button>
                        </nav>

                        <main className="main">
                            {user.role === 'Administrativo' && (
                                <>
                                    <div className="info-grid">
                                        <div>
                                            <div className="card" style={{marginBottom: '15px'}}>
                                                <h2 style={{margin: '0 0 10px 0', fontSize: '18px'}}>{rutaSel}</h2>
                                                <p><b>Estado:</b> <span style={{color: 'var(--green)'}}>En Operación</span></p>
                                                <div style={{display:'flex', gap:'10px', marginTop:'20px'}}>
                                                    <button className="btn btn-p" style={{background:'#25d366', border:'none'}}>WhatsApp</button>
                                                    <button className="btn btn-p" style={{background:'#80868b', border:'none'}}>Aviso</button>
                                                </div>
                                            </div>
                                            <div className="card">
                                                <p>🚌 Bus en paradero</p>
                                                <p>⚠️ Bus con retraso</p>
                                            </div>
                                        </div>
                                        <div id="map-admin" className="map-box"></div>
                                    </div>
                                    <table>
                                        <thead>
                                            <tr><th>Paradero</th><th>Estudiantes</th><th>Estado</th><th>Hora</th></tr>
                                        </thead>
                                        <tbody>
                                            <tr><td>Santa Clara</td><td>2</td><td><span className="status-badge bg-proximo">Próximo</span></td><td>08:45 AM</td></tr>
                                            <tr><td>Huaycán</td><td>3</td><td><span className="status-badge bg-llegando">Llegando</span></td><td>08:42 AM</td></tr>
                                        </tbody>
                                    </table>
                                </>
                            )}

                            {user.role === 'Conductor' && (
                                <div className="card" style={{textAlign:'center'}}>
                                    <h2>Panel de Conducción</h2>
                                    <p>Estás asignado a: <b>{rutaSel}</b></p>
                                    <button className="btn btn-p" style={{background:'var(--green)', width:'250px', margin:'0 auto 20px'}}>📡 INICIAR GPS</button>
                                    <div id="map-cond" className="map-box"></div>
                                </div>
                            )}

                            {user.role === 'Estudiante' && (
                                <div className="card">
                                    <h2>Ubicación del Bus: {rutaSel}</h2>
                                    <div id="map-est" className="map-box"></div>
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
