<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Cantuta - UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-blue: #1e3a8a;
            --bg-light: #f6f8fb;
            --text-main: #334155;
            --text-sub: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 20px;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg-light); height: 100vh; color: var(--text-main); }

        /* PANTALLA DE INICIO (MINIMALISTA) */
        .login-container { display: flex; height: 100vh; }
        .login-blue { flex: 1.2; background: var(--dark-blue); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .login-white { flex: 1; background: white; display: flex; justify-content: center; align-items: center; }
        .login-form { width: 340px; display: flex; flex-direction: column; gap: 15px; }
        .input-field { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 15px; }
        .btn-main { padding: 14px; background: var(--primary-blue); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; }

        /* LAYOUT GENERAL DE PANELES */
        .app-wrapper { display: flex; height: 100vh; overflow: hidden; padding: 20px; gap: 20px; }
        .sidebar { width: 300px; background: white; border-radius: var(--radius); padding: 25px; display: flex; flex-direction: column; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .main-panel { flex: 1; background: white; border-radius: var(--radius); padding: 30px; overflow-y: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }

        /* COMPONENTES DE RUTAS */
        .route-btn { 
            display: flex; align-items: center; justify-content: space-between; padding: 15px; 
            border: none; border-radius: 15px; background: var(--primary-blue); color: white; cursor: pointer; font-weight: 600;
        }
        .route-btn.inactive { background: transparent; color: var(--text-sub); border: 1px solid #f1f5f9; }
        
        /* DISEÑO ADMINISTRATIVO image_a6e51f.jpg */
        .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .map-card { background: white; border-radius: 15px; border: 1px solid #f1f5f9; overflow: hidden; }
        .map-thumb { height: 180px; background: #e2e8f0; position: relative; }
        
        .status-pill { padding: 4px 10px; border-radius: 8px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-green { background: #dcfce7; color: #166534; }
        .status-yellow { background: #fef3c7; color: #92400e; }

        .info-card { background: white; padding: 15px; border-radius: 15px; border: 1px solid #f1f5f9; display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; transition: 0.2s; }
        .info-card:hover { border-color: var(--primary-blue); background: #f8fafc; }

        .btn-action { padding: 8px 20px; border-radius: 10px; border: none; background: var(--primary-blue); color: white; font-weight: 600; cursor: pointer; font-size: 13px; }
        .btn-danger { background: var(--danger); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const WHATSAPP_CANAL = "https://whatsapp.com/channel/0029VbCR9BS9MF8ypba5gy0o";
        const RUTAS_INFO = {
            "Ruta UNI": { link: "https://chat.whatsapp.com/I2mw9VmXvgnL5Y7Mzuf3tj", color: "#3b82f6" },
            "Ruta Puente Nuevo": { link: "https://chat.whatsapp.com/IQTb0HJVjhBD0kiWqe56Ks", color: "#3b82f6" },
            "Ruta Puente Santa Anita": { link: "https://chat.whatsapp.com/DcOWGPkPvpD39PvA2B7iWH?mode=wwt", color: "#3b82f6" },
            "Ruta Bolognesi": { link: "https://chat.whatsapp.com/BEAlEiyUc3QIMdM0jUpHSY?mode=wwt", color: "#3b82f6" }
        };

        function App() {
            const [pantalla, setPantalla] = useState("login");
            const [rutaSel, setRutaSel] = useState("Ruta UNI");

            const handleLogin = (e) => {
                e.preventDefault();
                const t = e.target.tipo.value;
                setPantalla(t);
            };

            // --- PANTALLA DE INICIO (NUEVO DISEÑO MINIMALISTA) ---
            if (pantalla === "login") {
                return (
                    <div className="login-container">
                        <div className="login-blue">
                            <h1 style={{fontSize:'3.5rem', margin:0, fontWeight: 900}}>Bus cantuteño</h1>
                        </div>
                        <div className="login-white">
                            <form onSubmit={handleLogin} className="login-form">
                                <h2 style={{marginBottom: 10, textAlign: 'center'}}>Bienvenido</h2>
                                <select name="tipo" className="input-field" required>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Conductor">Conductor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                                <input placeholder="Usuario" className="input-field" />
                                <input type="password" placeholder="Contraseña" className="input-field" />
                                <button type="submit" className="btn-main">INGRESAR</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- PANEL ADMINISTRATIVO (DISEÑO SEGÚN image_a6e51f.jpg) ---
            if (pantalla === "Administrativo") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'20px'}}>
                                <div style={{background: 'var(--primary-blue)', padding: '10px', borderRadius: '12px', color:'white'}}>🚍</div>
                                <div><b>Administrativo</b><br/><small>SOMOS CANTUTA</small></div>
                            </div>
                            <small style={{color:'var(--text-sub)', fontWeight:700}}>Opciones</small>
                            <button className="route-btn">Ver reportes <span>&gt;</span></button>
                            
                            <small style={{color:'var(--text-sub)', fontWeight:700, marginTop:'10px'}}>Coadministrador</small>
                            <div className="info-card" style={{justifyContent:'space-between'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'10px'}}>👤 Lucas</div>
                                <span className="status-pill status-green">INICIADO SESION</span>
                            </div>
                            <div className="info-card" style={{justifyContent:'space-between'}}>
                                <div style={{display:'flex', alignItems:'center', gap:'10px'}}>👤 Pedro</div>
                                <span className="status-pill status-yellow">EN ESPERA</span>
                            </div>
                        </aside>

                        <main className="main-panel">
                            <div style={{display:'flex', justifyContent:'right', marginBottom:'20px'}}>
                                <button className="btn-action btn-danger" onClick={() => setPantalla("login")}>Cerrar sesión</button>
                            </div>
                            
                            <div className="map-grid">
                                {["Bolognesi", "UNI", "Ruta", "Puente Nuevo"].map(name => (
                                    <div key={name} className="map-card">
                                        <div style={{padding:'15px'}}><b>{name}</b></div>
                                        <div className="map-thumb">
                                            <img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=14&size=400x200&key=API" style={{width:'100%', height:'100%', objectFit:'cover'}} />
                                            <div style={{position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', background:'white', padding:'8px', borderRadius:'50%', boxShadow:'0 0 15px rgba(0,0,0,0.2)'}}>🚍</div>
                                        </div>
                                        <div style={{padding:'20px'}}>
                                            <div style={{fontSize:'13px', color:'var(--text-sub)'}}>Paradero a llegar:</div>
                                            <div style={{fontWeight:600, marginBottom:'10px'}}>Tiempo de llegada</div>
                                            <button className="btn-action">Copiar</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- PANEL CONDUCTOR ---
            if (pantalla === "Conductor") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'20px'}}>
                                <div style={{background: 'var(--primary-blue)', padding: '10px', borderRadius: '12px', color:'white'}}>🚍</div>
                                <div><b>Conductor</b><br/><small>DATOS PERSONALES</small></div>
                            </div>
                            <small>Placa: ABC-123</small>
                            {Object.keys(RUTAS_INFO).map(r => (
                                <button key={r} onClick={() => setRutaSel(r)} className={`route-btn ${rutaSel === r ? '' : 'inactive'}`}>
                                    {r} <span>&gt;</span>
                                </button>
                            ))}
                            <button className="btn-action btn-danger" style={{marginTop:'auto'}} onClick={() => setPantalla("login")}>Cerrar sesión</button>
                        </aside>
                        <main className="main-panel">
                            <h2>Huaycán</h2>
                            <div className="map-thumb" style={{height:'350px', borderRadius:'15px'}}>
                                <img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=15&size=800x400&key=API" style={{width:'100%', height:'100%', objectFit:'cover'}} />
                            </div>
                            <div style={{display:'flex', flexDirection:'column', gap:'10px', marginTop:'20px'}}>
                                <div className="info-card" style={{borderLeft:'5px solid var(--success)'}}>🔔 <b>Notificación:</b> <span style={{color:'var(--success)'}}>5 esterihuatca</span></div>
                                <div className="info-card" style={{borderLeft:'5px solid var(--danger)'}}>⏰ <b>Bus lleno</b></div>
                                <button className="btn-main" style={{width:'100%'}}>📢 Compartir ubicación</button>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- PANEL ESTUDIANTE (image_a59743.jpg) ---
            return (
                <div className="app-wrapper">
                    <aside className="sidebar">
                        <small style={{fontWeight:800, color:'var(--text-sub)'}}>DATOS PERSONALES</small>
                        {Object.keys(RUTAS_INFO).map(r => (
                            <button key={r} onClick={() => setRutaSel(r)} className={`route-btn ${rutaSel === r ? '' : 'inactive'}`}>
                                {r} <span>&gt;</span>
                            </button>
                        ))}
                        <div style={{marginTop:'auto', display:'flex', flexDirection:'column', gap:'10px'}}>
                            <div className="info-card">🚨 Reporte</div>
                            <div className="info-card" onClick={() => setPantalla("login")}>🚪 Cerrar sesión</div>
                        </div>
                    </aside>

                    <main className="main-panel">
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center'}}>
                            <h1 style={{color: 'var(--danger)', margin:0}}>{rutaSel.toUpperCase()}</h1>
                            <span className="status-pill status-green">● En camino</span>
                        </div>
                        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'30px', marginTop:'30px'}}>
                            <div style={{display:'flex', flexDirection:'column', gap:'15px'}}>
                                <a href={RUTAS_INFO[rutaSel].link} target="_blank" className="info-card">
                                    <div style={{background:'#fee2e2', padding:'10px', borderRadius:'10px'}}>💬</div>
                                    <div><b>WhatsApp Ruta</b><br/><small>Grupo de la {rutaSel}</small></div>
                                </a>
                                <a href={WHATSAPP_CANAL} target="_blank" className="info-card">
                                    <div style={{background:'#fee2e2', padding:'10px', borderRadius:'10px'}}>📢</div>
                                    <div><b>WhatsApp Canal</b><br/><small>Canal oficial de anuncios</small></div>
                                </a>
                                <div className="info-card" style={{background:'#eff6ff', border:'none'}}>
                                    <div style={{background:'#3b82f6', color:'white', padding:'10px', borderRadius:'10px'}}>ℹ️</div>
                                    <div><b>Información de servicio</b><br/><small>Actualizado hace 2 minutos</small></div>
                                </div>
                            </div>
                            <div className="map-container" style={{border:'1px solid #f1f5f9', borderRadius:'20px', overflow:'hidden'}}>
                                <div style={{padding:'15px', borderBottom:'1px solid #f1f5f9', fontSize:'12px'}}><b>MAPA EN TIEMPO REAL</b></div>
                                <img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=14&size=500x400&key=API" style={{width:'100%'}} />
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
