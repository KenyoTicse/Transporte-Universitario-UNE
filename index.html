<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Cantuteño - UNE</title>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        :root { --blue: #3b82f6; --dark: #1e3a8a; --red: #ef4444; --green: #22c55e; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; overflow: hidden; }
        .flex { display: flex; height: 100vh; }
        .side { width: 280px; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #e2e8f0; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; margin-bottom: 20px; }
        .btn { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: 600; width: 100%; display: flex; align-items: center; gap: 10px; transition: 0.2s; text-decoration: none; color: inherit; font-size: 13px; }
        .btn:hover { background: #f8fafc; border-color: var(--blue); }
        .btn-p { background: var(--blue); color: #fff; border: none; justify-content: center; font-size: 15px; }
        .btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        .grid-maps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .map-box { background: #eee; height: 180px; border-radius: 12px; border: 1px solid #ddd; }
        .status { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .st-red { background: #fee2e2; color: #b91c1c; }
        .st-green { background: #dcfce7; color: #166534; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .login-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .input-text { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SUPABASE_URL = 'https://vmltednkykuktcmfpjxw.supabase.co'; 
        const SUPABASE_KEY = 'TU_CLAVE_PUBLISHABLE_AQUI'; 
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const USUARIOS_DB = {
            "Admin": { pass: "Admin1", role: "Administrativo", name: "Administrador Cantuta" },
            "20223691": { pass: "20223691", role: "Estudiante", name: "KENYO PANTALEON TICSE HERRERA" },
            "12345678": { role: "Conductor", name: "LUIS PEREZ GALVEZ" }
        };

        const RUTAS_LIST = ["Ruta UNI", "Ruta Puente Nuevo", "Ruta Santa Anita", "Ruta Bolognesi"];

        function App() {
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");
            const [reportes, setReportes] = useState([]);
            const [busMarkers, setBusMarkers] = useState({});
            const mapsRef = useRef({});

            // Cargar Reportes e Ubicaciones
            useEffect(() => {
                if (user) {
                    const fetchInicial = async () => {
                        const { data: reps } = await supabaseClient.from('reportes').select('*').order('id', { ascending: false });
                        if (reps) setReportes(reps);
                        
                        const { data: locs } = await supabaseClient.from('ubicaciones_buses').select('*');
                        if (locs) locs.forEach(updateMarker);
                    };
                    fetchInicial();

                    const channel = supabaseClient.channel('realtime')
                        .on('postgres_changes', { event: '*', table: 'reportes' }, payload => {
                            if (payload.eventType === 'INSERT') setReportes(prev => [payload.new, ...prev]);
                        })
                        .on('postgres_changes', { event: '*', table: 'ubicaciones_buses' }, payload => {
                            updateMarker(payload.new);
                        }).subscribe();
                    
                    return () => supabaseClient.removeChannel(channel);
                }
            }, [user]);

            const updateMarker = (data) => {
                if (!data) return;
                const { ruta, latitud, longitud } = data;
                // Lógica para actualizar marcadores en los mapas correspondientes
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const id = e.target.id.value;
                const dbUser = USUARIOS_DB[id];
                if (dbUser && (dbUser.role === "Conductor" || dbUser.pass === e.target.pass.value)) {
                    setUser({ ...dbUser, id });
                } else { alert("Error de acceso"); }
            };

            const addReporte = async (motivo) => {
                await supabaseClient.from('reportes').insert([{ ruta: rutaSel, estudiante: user.name, motivo, hora: new Date().toLocaleTimeString() }]);
                alert("Reporte enviado");
            };

            // FUNCIÓN GPS CONDUCTOR
            const iniciarRuta = (placa, ruta) => {
                if ("geolocation" in navigator) {
                    navigator.geolocation.watchPosition(async (pos) => {
                        await supabaseClient.from('ubicaciones_buses').upsert({
                            id: user.id, ruta, latitud: pos.coords.latitude, longitud: pos.coords.longitude
                        });
                    });
                    alert(`Ruta ${ruta} iniciada con placa ${placa}`);
                }
            };

            if (!user) return (
                <div className="flex">
                    <div className="login-screen" style={{background: 'var(--dark)', color: '#fff'}}>
                        <h1 style={{fontSize: '4rem', fontWeight: 900}}>Bus cantuteño</h1>
                    </div>
                    <div className="login-screen">
                        <form onSubmit={handleLogin} style={{width: '300px', display:'flex', flexDirection:'column', gap:'10px'}}>
                            <h2>Iniciar Sesión</h2>
                            <input name="id" placeholder="DNI o Código" required className="input-text" />
                            <input name="pass" type="password" placeholder="Contraseña" className="input-text" />
                            <button className="btn btn-p">INGRESAR</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex">
                    <div className="side">
                        <b>{user.name}</b>
                        <small className="status st-green">{user.role}</small>
                        <hr style={{width:'100%', border:'0.5px solid #eee'}}/>
                        {user.role === 'Estudiante' && RUTAS_LIST.map(r => (
                            <button key={r} onClick={()=>setRutaSel(r)} className={`btn ${rutaSel===r?'active':''}`}>🚍 {r}</button>
                        ))}
                        <button onClick={()=>setUser(null)} className="btn" style={{marginTop:'auto', color:'var(--red)'}}>🚪 Salir</button>
                    </div>

                    <main className="main">
                        {user.role === 'Administrativo' && (
                            <>
                                <h2>Panel Administrativo - Multi Mapas</h2>
                                <div className="grid-maps">
                                    {RUTAS_LIST.map(r => (
                                        <div key={r} className="card" style={{margin:0}}>
                                            <b>{r}</b>
                                            <div id={`map-${r.replace(/ /g, '')}`} className="map-box"></div>
                                        </div>
                                    ))}
                                </div>
                                <div className="card" style={{marginTop:'20px'}}>
                                    <h3>🚩 Incidencias Estudiantiles</h3>
                                    <table>
                                        <thead><tr><th>Ruta</th><th>Estudiante</th><th>Motivo</th><th>Hora</th></tr></thead>
                                        <tbody>
                                            {reportes.map(r => (<tr key={r.id}><td>{r.ruta}</td><td>{r.estudiante}</td><td><span className="st-red status">{r.motivo}</span></td><td>{r.hora}</td></tr>))}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {user.role === 'Conductor' && (
                            <div className="card">
                                <h2>Registro de Turno y GPS</h2>
                                <p>Seleccione placa y ruta para empezar a transmitir:</p>
                                <select id="p" className="input-text" style={{marginBottom:'10px'}}><option>EGB-402</option><option>A9N-012</option></select>
                                <select id="r" className="input-text" style={{marginBottom:'10px'}}>{RUTAS_LIST.map(r=><option key={r}>{r}</option>)}</select>
                                <button onClick={()=>iniciarRuta(document.getElementById('p').value, document.getElementById('r').value)} className="btn btn-p">📡 INICIAR TRANSMISIÓN GPS</button>
                            </div>
                        )}

                        {user.role === 'Estudiante' && (
                            <div className="card">
                                <h1>{rutaSel}</h1>
                                <div id="map-estudiante" className="map-box" style={{height:'300px', marginBottom:'15px'}}></div>
                                <button onClick={()=>addReporte("El bus no paró")} className="btn" style={{color:'var(--red)', marginBottom:'10px'}}>🚨 El bus no paró</button>
                                <input id="txt" placeholder="Detalles..." className="input-text" />
                                <button onClick={()=>addReporte(document.getElementById('txt').value)} className="btn btn-p" style={{marginTop:'10px'}}>Enviar</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
