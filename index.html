<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Cantuteño - UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root { --blue: #3b82f6; --dark: #1e3a8a; --red: #ef4444; --green: #22c55e; --bg: #f8fafc; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #1e293b; overflow: hidden; }
        .flex { display: flex; height: 100vh; }
        .side { width: 280px; background: #fff; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #e2e8f0; }
        .main { flex: 1; padding: 25px; overflow-y: auto; }
        .card { background: #fff; border-radius: 16px; padding: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); border: 1px solid #f1f5f9; margin-bottom: 20px; }
        .btn { padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; background: #fff; cursor: pointer; font-weight: 600; width: 100%; display: flex; align-items: center; gap: 10px; transition: 0.2s; text-decoration: none; color: inherit; font-size: 13px; }
        .btn:hover { background: #f8fafc; border-color: var(--blue); }
        .btn-p { background: var(--blue); color: #fff; border: none; justify-content: center; font-size: 15px; }
        .btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
        .grid-maps { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .map-box { background: #eee; height: 140px; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; font-size: 11px; color: #666; }
        .status { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .st-red { background: #fee2e2; color: #b91c1c; }
        .st-green { background: #dcfce7; color: #166534; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th, td { text-align: left; padding: 10px; border-bottom: 1px solid #f1f5f9; }
        .login-screen { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .input-text { padding: 12px; border-radius: 10px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const USUARIOS_DB = {
            "Admin": { pass: "Admin1", role: "Administrativo", name: "Administrador Cantuta" },
            "20223691": { pass: "20223691", role: "Estudiante", name: "KENYO PANTALEON TICSE HERRERA" },
            "20212095": { pass: "20212095", role: "Estudiante", name: "ALEXANDER QUISPE NAJARRO" },
            "20223659": { pass: "20223659", role: "Estudiante", name: "SONIA RIVERA EVANGELISTA" },
            "20221293": { pass: "20221293", role: "Estudiante", name: "JORGE GUSTAVO PINEDA CABELLO" },
            "12345678": { role: "Conductor", name: "LUIS PEREZ GALVEZ" },
            "87654321": { role: "Conductor", name: "ESTEBAN NEYRA HUARI" }
        };

        const RUTAS_LIST = ["Ruta UNI", "Ruta Puente Nuevo", "Ruta Santa Anita", "Ruta Bolognesi"];

        function App() {
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");
            
            // Lógica para persistir reportes y logines
            const [reportes, setReportes] = useState(() => JSON.parse(localStorage.getItem('reps')) || []);
            const [loginsChofer, setLoginsChofer] = useState(() => JSON.parse(localStorage.getItem('logs')) || []);

            useEffect(() => { localStorage.setItem('reps', JSON.stringify(reportes)); }, [reportes]);
            useEffect(() => { localStorage.setItem('logs', JSON.stringify(loginsChofer)); }, [loginsChofer]);

            const handleLogin = (e) => {
                e.preventDefault();
                const id = e.target.id.value;
                const dbUser = USUARIOS_DB[id];
                if (!dbUser) return alert("Usuario no registrado");
                if (dbUser.role === "Conductor" || dbUser.pass === e.target.pass.value) {
                    setUser({ ...dbUser, id });
                } else { alert("Contraseña incorrecta"); }
            };

            const addReporte = (motivo) => {
                const nuevo = { id: Date.now(), ruta: rutaSel, estudiante: user.name, motivo, hora: new Date().toLocaleTimeString() };
                setReportes(prev => [nuevo, ...prev]);
                alert("Reporte guardado. El Admin lo verá al entrar.");
            };

            const addLogChofer = (placa, ruta) => {
                const log = { id: Date.now(), nombre: user.name, placa, ruta, hora: new Date().toLocaleTimeString() };
                setLoginsChofer(prev => [log, ...prev]);
                alert(`Ruta ${ruta} iniciada con placa ${placa}`);
            };

            if (!user) return (
                <div className="flex">
                    <div className="login-screen" style={{background: 'var(--dark)', color: '#fff'}}>
                        <h1 style={{fontSize: '4rem', fontWeight: 900}}>Bus cantuteño</h1>
                    </div>
                    <div className="login-screen">
                        <form onSubmit={handleLogin} style={{width: '300px', display:'flex', flexDirection:'column', gap:'10px'}}>
                            <h2>Iniciar Sesión</h2>
                            <input name="id" placeholder="DNI o Código" required className="input-text" />
                            <input name="pass" type="password" placeholder="Contraseña (Omitir conductores)" className="input-text" />
                            <button className="btn btn-p">INGRESAR</button>
                        </form>
                    </div>
                </div>
            );

            return (
                <div className="flex">
                    <div className="side">
                        <b>{user.name}</b>
                        <small className="status st-green">{user.role}</small>
                        <hr style={{width:'100%', border:'0.5px solid #eee'}}/>
                        {user.role === 'Estudiante' && RUTAS_LIST.map(r => (
                            <button key={r} onClick={()=>setRutaSel(r)} className={`btn ${rutaSel===r?'active':''}`}>🚍 {r}</button>
                        ))}
                        <button onClick={()=>setUser(null)} className="btn" style={{marginTop:'auto', color:'var(--red)'}}>🚪 Salir</button>
                    </div>

                    <main className="main">
                        {user.role === 'Administrativo' && (
                            <>
                                <h2>Panel Administrativo</h2>
                                <div className="grid-maps">
                                    {RUTAS_LIST.map(r => (
                                        <div key={r} className="card" style={{margin:0}}>
                                            <b>{r}</b>
                                            <div className="map-box">🗺️ GPS ACTIVO</div>
                                            <div style={{fontSize:'11px', marginTop:'5px'}}>Paradero: Santa Anita | 15 min</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="card" style={{marginTop:'20px'}}>
                                    <h3>🚩 Incidencias Estudiantiles</h3>
                                    <button onClick={()=>{setReportes([]); localStorage.removeItem('reps')}} style={{fontSize:'10px', float:'right'}}>Limpiar</button>
                                    <table>
                                        <thead><tr><th>Ruta</th><th>Estudiante</th><th>Motivo</th><th>Hora</th></tr></thead>
                                        <tbody>
                                            {reportes.map(r => (<tr key={r.id}><td>{r.ruta}</td><td>{r.estudiante}</td><td><span className="st-red status">{r.motivo}</span></td><td>{r.hora}</td></tr>))}
                                        </tbody>
                                    </table>
                                </div>
                                <div className="card">
                                    <h3>🚍 Log de Conductores</h3>
                                    <table>
                                        <thead><tr><th>Conductor</th><th>Placa</th><th>Ruta</th><th>Hora</th></tr></thead>
                                        <tbody>
                                            {loginsChofer.map(l => (<tr key={l.id}><td>{l.nombre}</td><td><b>{l.placa}</b></td><td>{l.ruta}</td><td>{l.hora}</td></tr>))}
                                        </tbody>
                                    </table>
                                </div>
                            </>
                        )}

                        {user.role === 'Estudiante' && (
                            <div className="card">
                                <h1>{rutaSel}</h1>
                                <div className="card" style={{background:'#fef2f2'}}>🔔 Bus llegara en 15 min al paradero.</div>
                                <p>Reportar Incidencia:</p>
                                <button onClick={()=>addReporte("El bus no paró")} className="btn" style={{color:'var(--red)', marginBottom:'10px'}}>🚨 El bus no paró</button>
                                <div style={{display:'flex', gap:'5px', marginBottom:'20px'}}>
                                    <input id="txt" placeholder="Agregar detalles..." className="input-text" />
                                    <button onClick={()=>{addReporte(document.getElementById('txt').value); document.getElementById('txt').value=''}} className="btn btn-p" style={{width:'80px'}}>Enviar</button>
                                </div>
                                <a href="#" className="btn">💬 WhatsApp Ruta</a>
                                <a href="#" className="btn">📢 Canal del transporte Universitario</a>
                            </div>
                        )}

                        {user.role === 'Conductor' && (
                            <div className="card">
                                <h2>Registro de Turno</h2>
                                <p>Seleccione placa y ruta:</p>
                                <select id="p" className="input-text" style={{marginBottom:'10px'}}><option>EGB-402</option><option>A9N-012</option><option>B5F-992</option></select>
                                <select id="r" className="input-text" style={{marginBottom:'10px'}}>{RUTAS_LIST.map(r=><option key={r}>{r}</option>)}</select>
                                <button onClick={()=>addLogChofer(document.getElementById('p').value, document.getElementById('r').value)} className="btn btn-p">INICIAR RUTA</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
