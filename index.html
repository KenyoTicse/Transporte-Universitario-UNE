<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Cantuta - Sistema Integral UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        :root {
            --primary-blue: #3b82f6;
            --dark-blue: #1e3a8a;
            --bg-light: #f6f8fb;
            --text-main: #334155;
            --text-sub: #64748b;
            --danger: #ef4444;
            --success: #22c55e;
            --radius: 16px;
        }

        * { box-sizing: border-box; font-family: 'Inter', 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--bg-light); height: 100vh; color: var(--text-main); }

        /* LOGIN STYLE */
        .login-container { display: flex; height: 100vh; }
        .login-blue { flex: 1.2; background: var(--dark-blue); color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .login-white { flex: 1; background: white; display: flex; justify-content: center; align-items: center; }
        .login-form { width: 340px; display: flex; flex-direction: column; gap: 15px; }
        .input-field { padding: 14px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 15px; }
        .btn-main { padding: 14px; background: var(--primary-blue); color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-main:hover { background: var(--dark-blue); }

        /* APP LAYOUT */
        .app-wrapper { display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR */
        .sidebar { width: 320px; background: white; border-right: 1px solid #e2e8f0; padding: 30px; display: flex; flex-direction: column; gap: 20px; }
        .sidebar-label { font-size: 11px; font-weight: 800; color: var(--text-sub); text-transform: uppercase; letter-spacing: 0.1em; }
        
        .route-btn { 
            display: flex; align-items: center; gap: 12px; padding: 16px; 
            border: none; border-radius: var(--radius); background: transparent;
            color: var(--text-sub); cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .route-btn.active { background: var(--primary-blue); color: white; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3); }
        .route-btn:hover:not(.active) { background: #f1f5f9; }

        .action-card { 
            display: flex; align-items: center; gap: 12px; padding: 12px; 
            border-radius: 12px; cursor: pointer; border: 1px solid #f1f5f9; transition: 0.2s;
        }
        .action-card:hover { background: #f8fafc; border-color: #e2e8f0; }

        /* MAIN CONTENT */
        .main-panel { flex: 1; padding: 40px; overflow-y: auto; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .title-red { font-size: 26px; color: var(--danger); font-weight: 900; margin: 0; }
        
        .pill { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-radius: 20px; font-size: 12px; font-weight: 700; }
        .pill-blue { background: #dbeafe; color: #1e40af; }
        .pill-green { background: #dcfce7; color: #166534; }

        .content-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 25px; }
        .grid-4 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        
        /* CARDS */
        .info-card { 
            background: white; padding: 18px; border-radius: var(--radius); 
            border: 1px solid #e2e8f0; margin-bottom: 12px; display: flex; align-items: center; gap: 15px;
        }
        .card-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

        /* MAP BOX */
        .map-container { 
            background: white; border-radius: var(--radius); border: 1px solid #e2e8f0; 
            overflow: hidden; display: flex; flex-direction: column; min-height: 300px;
        }
        .map-header { padding: 12px 20px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; font-size: 11px; font-weight: 800; color: var(--text-sub); }
        .map-body { flex: 1; background: #cbd5e1; position: relative; overflow: hidden; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const db = {
            "20223691": { pass: "2022", tipo: "Estudiante", nombre: "KENYO TICSE" },
            "12345678": { pass: "1234", tipo: "Conductor", nombre: "CONDUCTOR UNE" },
            "Admin": { pass: "AdminSC", tipo: "Administrativo", nombre: "ADMIN GENERAL" }
        };

        function App() {
            const [pantalla, setPantalla] = useState("login");
            const [user, setUser] = useState(null);
            const [rutaSel, setRutaSel] = useState("Ruta UNI");

            const handleLogin = (e) => {
                e.preventDefault();
                const u = e.target.user.value;
                const p = e.target.pass.value;
                const t = e.target.tipo.value;
                if (db[u] && db[u].pass === p && db[u].tipo === t) {
                    setUser(db[u]);
                    setPantalla(t);
                } else { alert("Datos incorrectos"); }
            };

            // --- VISTA LOGIN ---
            if (pantalla === "login") {
                return (
                    <div className="login-container">
                        <div className="login-blue">
                            <h1 style={{fontSize:'3.5rem', margin:0, fontWeight: 900}}>Somos Cantuta</h1>
                            <p style={{fontSize:'1.2rem', opacity: 0.8}}>Movilidad UNE en tiempo real</p>
                        </div>
                        <div className="login-white">
                            <form onSubmit={handleLogin} className="login-form">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Logo_UNE.png" width="80" style={{margin: "0 auto 10px"}}/>
                                <h2>Bienvenido</h2>
                                <select name="tipo" className="input-field" required>
                                    <option value="">Selecciona tu Rol</option>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Conductor">Conductor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                                <input name="user" placeholder="Usuario / Código" className="input-field" required />
                                <input name="pass" type="password" placeholder="Contraseña" className="input-field" required />
                                <button type="submit" className="btn-main">INGRESAR AL PANEL</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- VISTA ADMINISTRATIVO (4 MAPAS) ---
            if (pantalla === "Administrativo") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <div className="sidebar-label">Administración</div>
                            <button className="route-btn active"><span>📊</span> Ver Reportes</button>
                            <div className="sidebar-label" style={{marginTop:'15px'}}>Nuevo Admin</div>
                            <input className="input-field" placeholder="Usuario" style={{fontSize:'13px'}} />
                            <input className="input-field" type="password" placeholder="Pass" style={{fontSize:'13px'}} />
                            
                            <div className="sidebar-label" style={{marginTop:'15px'}}>Coadministradores</div>
                            <div className="action-card" style={{justifyContent:'space-between'}}>
                                <span style={{fontSize:'13px', fontWeight:600}}>Ruta UNI</span>
                                <span style={{background:'var(--success)', color:'white', padding:'2px 6px', borderRadius:'6px', fontSize:'9px'}}>HAB</span>
                            </div>
                            <div className="action-card" style={{justifyContent:'space-between'}}>
                                <span style={{fontSize:'13px', fontWeight:600}}>Ruta Bolognesi</span>
                                <span style={{background:'var(--danger)', color:'white', padding:'2px 6px', borderRadius:'6px', fontSize:'9px'}}>DEN</span>
                            </div>

                            <div style={{marginTop:'auto'}} className="action-card" onClick={() => window.location.reload()}>
                                <span>🔴</span> Cerrar Sesión
                            </div>
                        </aside>
                        <main className="main-panel">
                            <div className="header-row"><h1 className="title-red">ADMINISTRATIVO GLOBAL</h1></div>
                            <div className="grid-4">
                                {["Ruta Bolognesi", "Ruta Santa Anita", "Ruta UNI", "Ruta Puente Nuevo"].map(m => (
                                    <div key={m} className="map-container">
                                        <div className="map-header"><span>{m.toUpperCase()}</span></div>
                                        <div className="map-body"><img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=13&size=400x300&key=API" style={{width:'100%', height:'100%', objectFit:'cover'}} /></div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                );
            }

            // --- VISTA CONDUCTOR ---
            if (pantalla === "Conductor") {
                return (
                    <div className="app-wrapper">
                        <aside className="sidebar">
                            <div className="sidebar-label">Panel Conductor</div>
                            <div className="action-card"><span>👤</span> Placa: ABC-123</div>
                            {["Ruta UNI", "Ruta Bolognesi", "Ruta Santa Anita", "Ruta Puente Nuevo"].map(r => (
                                <button key={r} onClick={() => setRutaSel(r)} className={`route-btn ${rutaSel === r ? 'active' : ''}`}><span>🚍</span> {r}</button>
                            ))}
                            <div style={{marginTop:'auto'}} className="action-card" onClick={() => window.location.reload()}><span>🔴</span> Salir</div>
                        </aside>
                        <main className="main-panel">
                            <h1 className="title-red">{rutaSel}</h1>
                            <div className="content-grid" style={{marginTop:'20px'}}>
                                <div className="map-container" style={{gridColumn:'span 2', height:'380px'}}>
                                    <div className="map-header"><span>ESTADO EN VIVO</span> <span style={{color:'var(--success)'}}>● Transmitiendo</span></div>
                                    <div className="map-body"><img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=15&size=800x400&key=API" style={{width:'100%', height:'100%', objectFit:'cover'}} /></div>
                                </div>
                                <div className="info-card" style={{borderLeft:'5px solid var(--success)'}}>
                                    <div className="card-icon" style={{background:'#dcfce7'}}>🔔</div>
                                    <div><div style={{fontWeight:700}}>Notificación</div><div style={{fontSize:'12px', color:'var(--success)'}}>Ruta libre - 5 esterihuatca</div></div>
                                </div>
                                <div className="info-card" style={{borderLeft:'5px solid var(--danger)'}}>
                                    <div className="card-icon" style={{background:'#fee2e2'}}>⚠️</div>
                                    <div><div style={{fontWeight:700}}>Bus Lleno</div><div style={{fontSize:'12px', color:'var(--danger)'}}>Reportar capacidad máxima</div></div>
                                </div>
                                <button className="btn-main" style={{gridColumn:'span 2', fontSize:'16px'}}>COMPARTIR MI UBICACIÓN 📡</button>
                            </div>
                        </main>
                    </div>
                );
            }

            // --- VISTA ESTUDIANTE ---
            return (
                <div className="app-wrapper">
                    <aside className="sidebar">
                        <div className="sidebar-label">Rutas Disponibles</div>
                        {["Ruta UNI", "Ruta Puente Nuevo", "Ruta Puente Santa Anita", "Ruta Bolognesi"].map(r => (
                            <button key={r} className={`route-btn ${rutaSel === r ? 'active' : ''}`} onClick={() => setRutaSel(r)}>
                                <span>🚍</span> {r}
                            </button>
                        ))}
                        <div style={{marginTop:'auto'}}>
                            <div className="action-card"><span>🚨</span> Reportar Incidencia</div>
                            <div className="action-card" onClick={() => window.location.reload()}><span>🔴</span> Cerrar Sesión</div>
                        </div>
                    </aside>
                    <main className="main-panel">
                        <div className="header-row">
                            <h1 className="title-red">{rutaSel.toUpperCase()}</h1>
                            <div style={{display:'flex', gap:'10px'}}>
                                <div className="pill pill-blue"><span>🚌</span> 15 min</div>
                                <div className="pill pill-green">En camino</div>
                            </div>
                        </div>
                        <div className="content-grid">
                            <section>
                                <div className="info-card"><div className="card-icon" style={{background:'#fee2e2'}}>💬</div><div><b>WhatsApp Ruta</b><br/><small>Únete al grupo de apoyo</small></div></div>
                                <div className="info-card"><div className="card-icon" style={{background:'#fee2e2'}}>📢</div><div><b>Canal Oficial</b><br/><small>Anuncios de la universidad</small></div></div>
                                <div className="info-card" style={{background:'#eff6ff'}}><div className="card-icon" style={{background:'#3b82f6', color:'white'}}>ℹ️</div><div><b>Info Servicio</b><br/><small>Horarios y paraderos</small></div></div>
                            </section>
                            <section>
                                <div className="map-container" style={{height:'480px'}}>
                                    <div className="map-header"><span>TIEMPO REAL</span><span style={{color:'var(--success)'}}>● Conectado</span></div>
                                    <div className="map-body"><img src="https://maps.googleapis.com/maps/api/staticmap?center=-12.04,-77.02&zoom=14&size=600x500&key=API" style={{width:'100%', height:'100%', objectFit:'cover'}} /></div>
                                </div>
                            </section>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
