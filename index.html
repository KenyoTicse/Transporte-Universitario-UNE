<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Cantuta - UNE</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; height: 100%; background: #f0f2f5; }
        .login-container { display: flex; height: 100vh; }
        .login-blue { flex: 1.2; background: #0047AB; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; text-align: center;}
        .login-white { flex: 1; background: white; display: flex; justify-content: center; align-items: center; }
        .login-form { width: 320px; text-align: center; display: flex; flex-direction: column; gap: 15px; }
        .input-field { padding: 12px; border: 1px solid #ccc; border-radius: 25px; outline: none; }
        .btn-main { padding: 14px; background: #002855; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .header { background: #0047AB; color: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .btn-exit { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
        .dashboard-layout { display: flex; height: calc(100vh - 60px); }
        .sidebar { width: 260px; background: white; border-right: 1px solid #ddd; padding: 20px; }
        .map-area { flex: 1; padding: 20px; }
        .btn-blue { background: #0047AB; color: white; border: none; padding: 12px; border-radius: 8px; margin-bottom: 10px; width: 100%; cursor: pointer; }
        .btn-green { background: #16a34a; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; }
        .btn-red { background: #dc2626; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; cursor: pointer; }
        .route-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .route-card { padding: 30px; background: white; border: 2px solid #0047AB; color: #0047AB; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .route-card:hover { background: #0047AB; color: white; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [rol, setRol] = useState(null);
            const [pantalla, setPantalla] = useState("login");
            const [user, setUser] = useState(null);
            const [ruta, setRuta] = useState("");

            const db = {
                "20223691": { pass: "2022", tipo: "Estudiante", nombre: "KENYO TICSE" },
                "12345678": { pass: "1234", tipo: "Conductor", nombre: "CONDUCTOR UNE" },
                "Admin": { pass: "AdminSC", tipo: "Administrativo", nombre: "ADMIN GENERAL" }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const u = e.target.user.value;
                const p = e.target.pass.value;
                const t = e.target.tipo.value;

                if (db[u] && db[u].pass === p && db[u].tipo === t) {
                    setRol(t);
                    setUser(db[u]);
                    setPantalla(t === "Administrativo" ? "panel" : "rutas");
                } else {
                    alert("Usuario, clave o rol incorrectos");
                }
            };

            if (pantalla === "login") {
                return (
                    <div className="login-container">
                        <div className="login-blue">
                            <h1>Somos Cantuta</h1>
                            <p>Movilidad UNE en tiempo real</p>
                        </div>
                        <div className="login-white">
                            <form onSubmit={handleLogin} className="login-form">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/e/ea/Logo_UNE.png" width="80" style={{margin: "0 auto"}}/>
                                <h2>Iniciar Sesión</h2>
                                <select name="tipo" className="input-field" required>
                                    <option value="">Selecciona tu Rol</option>
                                    <option value="Estudiante">Estudiante</option>
                                    <option value="Conductor">Conductor</option>
                                    <option value="Administrativo">Administrativo</option>
                                </select>
                                <input name="user" placeholder="Usuario / Código" className="input-field" required />
                                <input name="pass" type="password" placeholder="Contraseña" className="input-field" required />
                                <button type="submit" className="btn-main">INGRESAR</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (pantalla === "rutas") {
                return (
                    <div>
                        <header className="header">
                            <span>Bienvenido, {user.nombre}</span>
                            <button onClick={() => window.location.reload()} className="btn-exit">Salir</button>
                        </header>
                        <div style={{padding: '40px', textAlign: 'center'}}>
                            <h3>Selecciona tu Ruta</h3>
                            <div className="route-grid">
                                {["Bolognesi", "UNI", "Santa Anita", "Puente Nuevo"].map(r => (
                                    <button key={r} className="route-card" onClick={() => {setRuta(r); setPantalla("panel")}}>Ruta {r}</button>
                                ))}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <header className="header">
                        <span>🚍 {rol}: {ruta || "Administración"}</span>
                        <button onClick={() => setPantalla(rol === "Administrativo" ? "login" : "rutas")} className="btn-exit">Volver</button>
                    </header>
                    <div className="dashboard-layout">
                        <aside className="sidebar">
                            <h3>Opciones</h3>
                            {rol === "Estudiante" && <button className="btn-blue">📍 Estoy en Paradero</button>}
                            {rol === "Conductor" && <button className="btn-green">🟢 Compartir GPS</button>}
                            {rol === "Administrativo" && <button className="btn-blue">📋 Ver Reportes</button>}
                        </aside>
                        <main className="map-area">
                            <div style={{background: '#ddd', height: '100%', borderRadius: '15px', display: 'flex', alignItems: 'center', justifyContent: 'center'}}>
                                <b>Mapa de Ruta {ruta} - Cargando...</b>
                            </div>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
