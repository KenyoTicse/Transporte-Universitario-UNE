<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Somos Cantuta - Sistema Integral UNE</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --primary: #002855; --secondary: #0047AB; --accent: #3b82f6;
            --success: #16a34a; --danger: #dc2626; --light: #f8fafc; --dark: #1e293b;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { margin: 0; padding: 0; background: var(--light); height: 100vh; overflow: hidden; }
        
        /* Utilidades */
        .flex-row { display: flex; }
        .flex-col { display: flex; flex-direction: column; }
        .btn { border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; padding: 10px; }
        .card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); padding: 15px; }
        
        /* Layout */
        .navbar { background: var(--primary); color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; height: 60px; }
        .sidebar { width: 280px; background: white; border-right: 1px solid #e2e8f0; padding: 20px; height: calc(100vh - 60px); overflow-y: auto; }
        .main-view { flex: 1; padding: 20px; height: calc(100vh - 60px); overflow-y: auto; }
        
        /* Componentes Específicos */
        .map-placeholder { flex: 1; background: #e2e8f0; border: 2px solid var(--secondary); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; min-height: 200px; }
        .map-label { position: absolute; top: 10px; left: 10px; background: var(--secondary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-badge { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; color: white; }
        .grid-maps { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 20px; height: 100%; }
        
        /* Botones de Navegación del Estudiante */
        .btn-ruta { background: var(--secondary); color: white; margin-bottom: 10px; text-align: left; padding: 15px; }
        .btn-ruta:hover { background: var(--primary); transform: translateX(5px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
            const [rol, setRol] = useState("login"); // login, admin, conductor, estudiante
            const [selectedRuta, setSelectedRuta] = useState("UNI");

            const Login = () => (
                <div style={{height: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', background: 'linear-gradient(135deg, #002855 0%, #0047AB 100%)'}}>
                    <div className="card" style={{width: '350px', textAlign: 'center', padding: '40px'}}>
                        <h2 style={{color: var(--primary)}}>Somos Cantuta</h2>
                        <p>Selecciona un panel para probar:</p>
                        <button className="btn btn-ruta" style={{width: '100%'}} onClick={() => setRol("admin")}>PANEL ADMINISTRATIVO</button>
                        <button className="btn btn-ruta" style={{width: '100%'}} onClick={() => setRol("conductor")}>PANEL CONDUCTOR</button>
                        <button className="btn btn-ruta" style={{width: '100%'}} onClick={() => setRol("estudiante")}>PANEL ESTUDIANTE</button>
                    </div>
                </div>
            );

            const Navbar = ({titulo}) => (
                <nav className="navbar">
                    <div style={{display: 'flex', alignItems: 'center', gap: '10px'}}>
                        <span style={{fontSize: '20px'}}>🚍</span>
                        <b style={{fontSize: '14px'}}>{titulo}</b>
                    </div>
                    <button className="btn" style={{background: 'rgba(255,255,255,0.2)', color: 'white'}} onClick={() => setRol("login")}>CERRAR SESIÓN</button>
                </nav>
            );

            // --- VISTA ADMINISTRADOR ---
            if (rol === "admin") return (
                <div className="flex-col">
                    <Navbar titulo="ADMINISTRATIVO: GESTIÓN GENERAL" />
                    <div className="flex-row">
                        <aside className="sidebar flex-col" style={{gap: '25px'}}>
                            <div>
                                <small style={{color: '#64748b', fontWeight: 'bold'}}>OPCIONES</small>
                                <button className="btn" style={{width: '100%', background: var(--accent), color: 'white', marginTop: '10px'}}>📊 VER REPORTES</button>
                            </div>
                            <div>
                                <small style={{color: '#64748b', fontWeight: 'bold'}}>AGREGAR ADMINISTRADOR</small>
                                <input placeholder="Usuario" style={{width: '100%', padding: '8px', marginTop: '5px', borderRadius: '5px', border: '1px solid #ddd'}} />
                                <input type="password" placeholder="Contraseña" style={{width: '100%', padding: '8px', marginTop: '5px', borderRadius: '5px', border: '1px solid #ddd'}} />
                            </div>
                            <div className="flex-col" style={{gap: '10px'}}>
                                <small style={{color: '#64748b', fontWeight: 'bold'}}>ESTADO COADMINISTRADORES</small>
                                {[
                                    {r: "Bolognesi", s: "DENEGADO", c: "var(--danger)"},
                                    {r: "Santa Anita", s: "HABILITADO", c: "var(--success)"},
                                    {r: "UNI", s: "HABILITADO", c: "var(--success)"},
                                    {r: "Puente Nuevo", s: "HABILITADO", c: "var(--success)"}
                                ].map(item => (
                                    <div key={item.r} style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center'}}>
                                        <span style={{fontSize: '11px', fontWeight: '600'}}>{item.r.toUpperCase()}</span>
                                        <span className="status-badge" style={{background: item.c}}>{item.s}</span>
                                    </div>
                                ))}
                            </div>
                        </aside>
                        <main className="main-view flex-col">
                            <div className="grid-maps">
                                {["BOLOGNESI", "PUENTE SANTA ANITA", "UNI", "PUENTE NUEVO"].map(m => (
                                    <div key={m} className="map-placeholder">
                                        <span className="map-label">{m}</span>
                                        <b style={{color: '#94a3b8'}}>CARGANDO MAPA EN VIVO...</b>
                                    </div>
                                ))}
                            </div>
                            <div className="card" style={{marginTop: '20px', display: 'flex', justifyContent: 'space-around', background: '#f1f5f9'}}>
                                {["UNI", "PUEBLO NUEVO", "BOLOGNESI", "SANTA ANITA"].map(r => (
                                    <div key={r} style={{fontSize: '12px'}}>
                                        <b style={{color: var(--secondary)}}>RUTA {r}</b>
                                        <div style={{color: '#64748b'}}>Llega a: <b>Tagore</b></div>
                                        <div style={{color: '#64748b'}}>Tiempo: <b>8 min</b></div>
                                    </div>
                                ))}
                            </div>
                        </main>
                    </div>
                </div>
            );

            // --- VISTA CONDUCTOR ---
            if (rol === "conductor") return (
                <div className="flex-col">
                    <Navbar titulo="PANEL DEL CONDUCTOR" />
                    <div className="flex-row">
                        <aside className="sidebar">
                            <h3 style={{color: var(--primary), margin: '0 0 20px 0'}}>DATOS PERSONALES</h3>
                            <div style={{background: '#f1f5f9', padding: '15px', borderRadius: '10px', marginBottom: '20px'}}>
                                <p style={{margin: '5px 0'}}><b>NOMBRE:</b> JUAN PÉREZ</p>
                                <p style={{margin: '5px 0'}}><b>PLACA:</b> <span style={{color: var(--success)}}>EGB-452</span></p>
                            </div>
                            <div className="flex-col" style={{gap: '10px'}}>
                                {["RUTA UNI", "RUTA BOLOGNESI", "RUTA SANTA ANITA", "RUTA PUENTE NUEVO"].map(r => (
                                    <button key={r} className={`btn ${selectedRuta === r ? 'btn-ruta' : ''}`} style={{border: '1px solid #ddd', textAlign: 'left'}} onClick={() => setSelectedRuta(r)}>
                                        {r}
                                    </button>
                                ))}
                            </div>
                            <div className="card" style={{marginTop: '30px', borderLeft: '5px solid var(--success)'}}>
                                <b style={{color: var(--success)}}>🔔 NOTIFICACIÓN</b>
                                <p style={{fontSize: '13px', margin: '5px 0'}}><b>5 ESTUDIANTES</b> esperando en:</p>
                                <p style={{color: var(--danger), fontWeight: 'bold'}}>PARADERO: HUAYCÁN</p>
                                <span className="status-badge" style={{background: var(--danger), display: 'inline-block', marginTop: '5px'}}>BUS LLENO</span>
                            </div>
                        </aside>
                        <main className="main-view flex-col">
                            <div className="map-placeholder" style={{border: '4px solid var(--success)'}}>
                                <span className="map-label" style={{background: var(--success)}}>MI UBICACIÓN ACTUAL - {selectedRuta}</span>
                                <button className="btn" style={{background: var(--danger), color: 'white', padding: '20px 40px', fontSize: '18px'}}>COMPARTIR UBICACIÓN</button>
                            </div>
                        </main>
                    </div>
                </div>
            );

            // --- VISTA ESTUDIANTE ---
            if (rol === "estudiante") return (
                <div className="flex-col">
                    <Navbar titulo="PANEL DEL ESTUDIANTE" />
                    <div className="flex-row">
                        <aside className="sidebar">
                            <h3 style={{color: var(--primary), margin: '0 0 20px 0'}}>MIS RUTAS</h3>
                            <div className="flex-col">
                                {["RUTA UNI", "RUTA PUENTE NUEVO", "RUTA SANTA ANITA", "RUTA BOLOGNESI"].map(r => (
                                    <button key={r} className="btn btn-ruta" onClick={() => setSelectedRuta(r)}>{r.toLowerCase()}</button>
                                ))}
                            </div>
                            <button className="btn" style={{marginTop: '20px', color: var(--danger), background: 'none', textAlign: 'left'}}>⚠️ reportar problema</button>
                        </aside>
                        <main className="main-view flex-row" style={{gap: '20px'}}>
                            <div className="flex-col" style={{flex: 1, gap: '20px'}}>
                                <div className="card" style={{borderLeft: '5px solid var(--accent)'}}>
                                    <h2 style={{color: var(--secondary), margin: '0'}}>{selectedRuta}</h2>
                                    <h3 style={{color: var(--danger)}}>BUS LLEGANDO EN 15 MIN</h3>
                                </div>
                                <div className="flex-col" style={{gap: '10px'}}>
                                    <button className="btn" style={{background: '#25D366', color: 'white'}}>WHATSAPP RUTA</button>
                                    <button className="btn" style={{background: '#128C7E', color: 'white'}}>WHATSAPP CANAL</button>
                                </div>
                            </div>
                            <div className="map-placeholder" style={{flex: 2}}>
                                <span className="map-label">MAPA DE SEGUIMIENTO</span>
                                <b style={{color: '#94a3b8'}}>SIGUIENDO BUS EN TIEMPO REAL...</b>
                            </div>
                        </main>
                    </div>
                </div>
            );

            return <Login />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
